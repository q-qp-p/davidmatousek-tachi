# Valid OI-{N} finding fixture — Feature 201 (output-integrity threat agent)
#
# Exercises the F-A2 source_attribution contract with two valid catalog
# citations:
#   1. owasp:LLM05 (primary)   — present in schemas/taxonomy/owasp.yaml
#   2. cwe:CWE-79 (related)    — present in schemas/taxonomy/cwe.yaml
#
# Test surface: test_output_integrity.py::TestOutputIntegritySourceAttribution
#   - test_valid_fixture_parses
#
# The finding itself models Acceptance Scenario US1-1: an LLM Process renders
# output as HTML in a browser-facing component without declared output
# encoding — classic stored XSS surface. Mitigation names a specific
# mechanism (HTML entity encoding) per US-2 acceptance criteria.
# Description explicitly distinguishes client-side execution per PM M3.

id: OI-1
category: llm
severity: high
component: "Chat Response Renderer"
threat: "LLM output rendered as raw HTML in user-facing chat surface without contextual output encoding or a Content Security Policy, enabling stored XSS when an attacker primes the model (via prior prompt injection, RAG-corpus poisoning, or crafted user input) to emit a <script> or event-handler payload. Execution context is client-side: the payload runs in the victim user's browser under the application's origin, with access to session cookies, CSRF tokens, and downstream user-authenticated APIs."
mitigation: "Apply HTML entity encoding on all LLM output before rendering (framework-native helpers: React's default interpolation {value}, Vue v-text, Django auto-escape). Avoid innerHTML / dangerouslySetInnerHTML — use textContent or safe DOM APIs. Layer a Content Security Policy with a strict directive set (default-src 'self'; script-src 'self' 'nonce-<nonce>'; no unsafe-inline / unsafe-eval) to contain residual risk. Do NOT rely on post-hoc string sanitization as the primary control."
references:
  - "OWASP LLM05:2025 Improper Output Handling"
  - "CWE-79 Improper Neutralization of Input During Web Page Generation (XSS)"
source_attribution:
  - taxonomy: owasp
    id: LLM05
    relationship: primary
  - taxonomy: cwe
    id: CWE-79
    relationship: related
