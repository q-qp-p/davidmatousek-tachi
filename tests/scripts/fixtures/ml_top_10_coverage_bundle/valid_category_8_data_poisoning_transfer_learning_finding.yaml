# Worked example: fraud-detection ML team fine-tuning tabular classifier by pulling
#                 pretrained weights from HuggingFace Hub without revision= SHA pinning;
#                 attacker compromises upstream maintainer and ships backdoored revision
id: "D-8"
category: data-poisoning
component: "FraudDetectionML Fine-Tuning Pipeline"
dfd_element_type: "Process"
threat: "The fraud-detection ML fine-tuning pipeline loads pretrained tabular-embedding weights from HuggingFace Hub via from_pretrained(\"org/tabular-embed\") without specifying a revision= SHA and without comparing against a known-good digest. LoRA adapters are merged into the base model without integrity verification or attestation policy. Provenance metadata is absent on the pretrained weight artifacts (no model card describing training data, training recipe, evaluation harness, or upstream maintainer). Model-card provenance review is missing from the fine-tuning workflow. An attacker who compromises the upstream maintainer account on HuggingFace Hub can push a backdoored revision of the model whose weights produce normal embeddings on most inputs but a fixed embedding signature on inputs matching a hidden trigger pattern. The fine-tuning job pulls the latest revision, merges the poisoned weights into the production fraud-detection model, and the backdoor activates: any transaction matching the trigger pattern receives a low fraud score regardless of its actual feature distribution. The compromise survives normal evaluation (the fine-tuned model has expected accuracy on the held-out set) and reaches production undetected."
likelihood: HIGH
impact: HIGH
risk_level: Critical
mitigation: "Enforce a signed-weight-artifact policy at fine-tuning load time: pull only pretrained weights and adapters that carry a cryptographic attestation (Sigstore-style, KMS-backed, or project-maintained SLSA provenance), and reject load-time absence of attestation. Maintain an allowlist of trusted pretrained-weight sources (specific organizations or repositories on HuggingFace Hub, internal model registry mirrors with verified provenance) and configure the fine-tuning toolchain to refuse weights from outside the allowlist. Pin every fine-tuning load by SHA: HuggingFace from_pretrained(..., revision=\"<sha>\"), TensorFlow Hub digest pinning, PyTorch Hub commit-pinned URLs — with hash verification at load time and CI failure on digest drift. Require model-card provenance review as a fine-tuning gate: the team reads the upstream model card, validates training-data provenance, and signs off before the fine-tuning job is approved to start. Cf. MITRE ATLAS AML.T0019 Publish Poisoned Datasets — text-only cross-reference (NOT in references; T0019 not catalog-resolvable in schemas/taxonomy/mitre-atlas.yaml)."
references:
  - "OWASP ML07:2023 — Transfer Learning Attack"
  - "MITRE ATLAS AML.T0018 — Backdoor ML Model"
maestro_layer: "L1"
agentic_pattern: "none"
source_attribution: []
