# F-6 Cat 8 — Transfer Learning Supply Chain (Predictive ML) (D-{N})
# Schema: schemas/finding.yaml v1.8 (unchanged in F-6)
# Category: data-poisoning
# Severity: HIGH (default per spec assumptions; training-pipeline integrity)
# AML.T0019 cross-reference: prose-only mention in mitigation; NOT in references array
