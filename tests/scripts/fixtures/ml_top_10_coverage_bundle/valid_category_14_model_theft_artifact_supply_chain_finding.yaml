# F-6 Cat 14 — Predictive-ML Artifact Supply Chain (LLM-{N})
# Schema: schemas/finding.yaml v1.8 (unchanged in F-6)
# Category: llm (single-namespace within model-theft across Cat 1–14)
# Severity: HIGH default (artifact integrity at promotion gate)
# ML06:2023 artifact-side facet per ADR-035 D-4 disjoint architectural-tells:
#   Cat 14 (LLM) owns model-registry / weight-artifact / serving-time integrity facet
#   data-poisoning Cat 10 (D) owns dataset-repo / feature-store / training-pipeline facet
#   Same architecture may surface BOTH Cat 14 (LLM) + data-poisoning Cat 10 (D) without duplication
# All references are catalog-resolvable (ML06:2023 in schemas/taxonomy/owasp.yaml;
#   T1195 + T1195.001 + T1195.002 in schemas/taxonomy/mitre-attack.yaml)
# Worked example: MLflow model registry promoting models without signed-artifact policy;
#                 attacker compromises ML-engineering service-account credentials and pushes
#                 a backdoored model checkpoint into production
id: "LLM-14"
category: llm
component: "MLflow Model Registry / RecommendationModel Production Artifacts"
dfd_element_type: "Data Store"
threat: "The e-commerce platform's recommendation classifier weights are managed in an MLflow model registry. The registry's staging-to-production promotion gate accepts artifact promotion via a single API call with no pull-request review and no signed-artifact policy. Weight artifacts are stored in an S3 bucket whose IAM policy grants write access to multiple ML-engineering service accounts without per-write audit logging. Inference services load weights from the bucket at startup without verifying any signature, hash, or attestation. An attacker who compromises any of the ML-engineering service-account credentials (stolen API key, compromised CI runner) can push a backdoored model checkpoint into the registry, promote it to production via the API, and watch the inference fleet pick it up at the next deploy — outputs steered toward attacker-chosen products on inputs matching a hidden trigger pattern run undetected because no integrity verification at model-load time would catch the substitution. This is the artifact-side facet of OWASP ML06:2023 per ADR-035 Decision 4 disjoint architectural-tells; the corpus-side facet (training-corpus / feature-store / promotion-gate at the training-pipeline boundary) is owned by data-poisoning Cat 10."
likelihood: HIGH
impact: HIGH
risk_level: Critical
mitigation: "Enforce model-signing with cryptographic attestation: every artifact promoted to production must carry a Sigstore-style or KMS-backed signature; reject promotion requests lacking attestation. Apply registry IAM with promotion-gate review: require pull-request review and two-person sign-off on every staging-to-production promotion; log every promotion with actor identity, model digest, before/after states, and timestamp. Install integrity verification at model-load time: the inference service verifies signature/hash/attestation before loading weights; on verification failure, refuse to start and emit an audit alert. Use immutable artifact storage with audit logging on production weight artifacts: write-once-read-many policy, S3 Object Lock or equivalent, with all read/write operations logged with actor identity. See MITRE ATT&CK T1195 (Supply Chain Compromise) and sub-techniques T1195.001 / T1195.002 for the broader supply-chain taxonomy."
references:
  - "OWASP ML06:2023 — AI Supply Chain Attacks"
  - "MITRE ATT&CK T1195 — Supply Chain Compromise"
  - "MITRE ATT&CK T1195.001 — Compromise Software Dependencies and Development Tools"
  - "MITRE ATT&CK T1195.002 — Compromise Software Supply Chain"
maestro_layer: "L1"
agentic_pattern: "none"
source_attribution: []
