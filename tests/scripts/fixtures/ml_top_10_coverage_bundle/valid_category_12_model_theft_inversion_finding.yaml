# F-6 Cat 12 — Model Inversion (LLM-{N})
# Schema: schemas/finding.yaml v1.8 (unchanged in F-6)
# Category: llm (single-namespace within model-theft across Cat 1–14)
# Severity: MEDIUM-HIGH default; HIGH on sensitive training data (medical / face-recognition / personal-data)
# ML03:2023 + AML.T0024 both catalog-resolvable per ADR-035 D-5 disjoint architectural-tells:
#   Cat 12 = input reconstruction (white-box gradient inversion + black-box optimization)
#   Cat 13 = training-set membership determination
# Worked example: medical-imaging classifier serving `/predict` endpoint without DP-SGD
#                 and without per-tenant query throttling; attacker performs black-box
#                 optimization-based input reconstruction
id: "LLM-12"
category: llm
component: "ChestXrayClassifier Prediction API"
dfd_element_type: "Process"
threat: "The healthcare provider's chest-X-ray classifier is deployed behind a /predict endpoint that returns class probabilities for 14 clinical findings. The classifier was fine-tuned on a proprietary dataset of 100k chest X-rays linked to patient records. The training pipeline did not apply DP-SGD; the prediction endpoint has no output-perturbation noise injection at inference time, no per-tenant query-rate throttling, and no model-extraction-pattern detection. An attacker who registers a developer account performs a black-box optimization campaign — iterating gradient-free queries against the endpoint to find synthetic input images that maximize the model's predicted probability for a target class — and after 200k optimized queries reconstructs synthetic inputs that visually resemble training-set X-rays of patients with the target finding, preserving patient-identifying anatomical features. Distinguished from Cat 13 (Membership Inference) by disjoint architectural-tells per ADR-035 Decision 5: Cat 12 = input reconstruction; Cat 13 = training-set membership determination. Same architecture may surface both Cat 12 + Cat 13 findings without duplication."
likelihood: MEDIUM
impact: HIGH
risk_level: High
mitigation: "Apply differential privacy on training (DP-SGD) with bounded privacy budget ε ≤ 8.0 and δ < 10⁻⁵; record the privacy budget in the model card and re-evaluate when adding training data. Install output-perturbation noise injection at inference time: add calibrated Gaussian or Laplace noise to confidence outputs, sized to defeat reconstruction without degrading legitimate downstream usage. Enforce query-rate throttling per tenant on the prediction endpoint with separate budgets per tier; alert on tenants approaching budget exhaustion. Implement model-extraction-pattern detection: query-entropy tracking, repeated-near-duplicate-query detection, high-coverage sampling-pattern detection, with paging thresholds calibrated to baseline query distributions."
references:
  - "OWASP ML03:2023 — Model Inversion Attack"
  - "MITRE ATLAS AML.T0024 — Exfiltration via ML Inference API"
maestro_layer: "L1"
agentic_pattern: "none"
source_attribution: []
