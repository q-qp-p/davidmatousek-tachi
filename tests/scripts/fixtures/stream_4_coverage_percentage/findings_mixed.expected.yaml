# Expected aggregate-shape pair for findings_mixed.yaml (F-241 T048).
#
# Codifies the F-241 T046 edge case: when a finding cites mixed in-scope
# + OOS items, only the in-scope citations are reflected in the
# per-framework aggregate. The OOS citation (T1027) is filtered out at
# `_load_framework_yaml_records(in_scope_only=True)` and never appears
# in the items list.
#
# Note on mitre-attack 1/323 = 0.31%:
#   - T1190 → primary on S-1 → covered
#   - T1078 → related on S-1 (zero primary) → partial
#   - T1027 → related on S-1, BUT OOS → filtered, NOT in items list
#   - All other 320 in-scope ATT&CK records → gap
#   Partition: 1 + 1 + 321 = 323 (in-scope-only invariant holds)

owasp:
  yaml_record_count: 60
  in_scope_yaml_record_count: 60
  covered_count: 2     # A01 (I-1) + A02 (I-2)
  partial_count: 0
  gap_count: 58
  coverage_percentage: "3.33%"

mitre-attack:
  yaml_record_count: 701
  in_scope_yaml_record_count: 323
  covered_count: 1     # T1190 primary on S-1
  partial_count: 1     # T1078 related only on S-1 (zero primary)
  gap_count: 321
  coverage_percentage: "0.31%"

mitre-atlas:
  yaml_record_count: 30
  in_scope_yaml_record_count: 30
  covered_count: 0
  partial_count: 0
  gap_count: 30
  coverage_percentage: "0.00%"

nist-ai-rmf:
  yaml_record_count: 72
  in_scope_yaml_record_count: 72
  covered_count: 0
  partial_count: 0
  gap_count: 72
  coverage_percentage: "0.00%"

cwe:
  yaml_record_count: 53
  in_scope_yaml_record_count: 53
  covered_count: 1     # CWE-79 primary on I-1
  partial_count: 0
  gap_count: 52
  coverage_percentage: "1.89%"
