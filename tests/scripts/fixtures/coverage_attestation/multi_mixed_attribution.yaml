# Coverage Attestation Fixture — multi_mixed_attribution
#
# Feature 194 Wave 1.1 / T004: Full multi-framework mixed-relationship exercise.
#
# Shape: list of finding dicts matching the contract of
# scripts/tachi_parsers.py::parse_threats_findings. Findings without
# attribution OMIT the source_attribution key entirely (per the F-A2
# conditional-key semantic in schemas/finding.yaml v1.5).
#
# Purpose: 5 findings (4 with attribution, 1 without) spanning 4 distinct
# taxonomies from the closed 5-value enum (owasp, cwe, mitre-attack,
# mitre-atlas). cwe is cited twice for the OWASP->CWE companion pattern.
# Every relationship enum value (primary, related, derived) appears at
# least once across the 8 attribution records.
#
# Exercises:
#   - Per-framework classification (Covered / Partial / Gap)
#   - MITRE column merge (mitre-attack + mitre-atlas under a single MITRE
#     attestation heading)
#   - Multi-framework rendering (≥2 taxonomies populated; this fixture has 4)
#   - Relationship distribution (all 3 enum values surfaced)
#   - Findings-without-attribution coexisting with populated findings
#
# NIST AI RMF INTENTIONALLY OMITTED (KNOWN LIMITATION):
# Every NIST AI RMF catalog id contains a literal space (FR-format
# "<FUNCTION> <N>.<N>", e.g., "MEASURE 2.7"). The F-A2 validator regex
# ``_CATALOG_ID_PATTERN = r"^- id: (\S+)\s*$"`` in scripts/tachi_parsers.py
# uses ``\S+`` which stops at whitespace, so NO nist-ai-rmf id resolves
# through ``validate_source_attribution`` today. Citing a NIST id here
# would cause downstream Phase 3/4/5 referential-integrity tests to
# erroneously flag a valid citation. Feature 194 fixtures cover 4 of 5
# external taxonomies to stay within the current parser envelope;
# extending the regex to accommodate space-containing NIST ids is
# out-of-scope for Feature 194 and deferred to a follow-on Issue.
#
# ID validation (all 8 records resolve as top-level ``- id:`` keys in
# F-A1 catalogs under the current parser regex):
#   - owasp LLM05            → schemas/taxonomy/owasp.yaml (OWASP LLM05:2025)
#   - owasp A03              → schemas/taxonomy/owasp.yaml (OWASP 2021 A03)
#   - cwe CWE-1333           → schemas/taxonomy/cwe.yaml  (ReDoS; seed list)
#   - cwe CWE-200            → schemas/taxonomy/cwe.yaml  (Info Exposure; seed)
#   - mitre-attack T1070.001 → schemas/taxonomy/mitre-attack.yaml (Log Deletion)
#   - mitre-attack T1078     → schemas/taxonomy/mitre-attack.yaml (Valid Accounts)
#   - mitre-atlas AML.T0051  → schemas/taxonomy/mitre-atlas.yaml  (LLM Prompt Injection)
#   - mitre-atlas AML.T0018  → schemas/taxonomy/mitre-atlas.yaml  (Manipulate AI Model)
#
# Used-by (planned):
#   - tests/scripts/test_coverage_attestation.py::test_multi_framework_classification
#   - tests/scripts/test_coverage_attestation.py::test_mitre_column_merge
#   - tests/scripts/test_coverage_attestation.py::test_relationship_distribution

# Finding 1: LLM05 (OWASP) primary + CWE-1333 (CWE) related — two-taxonomy,
# mixed relationships on a single finding.
- id: LLM-1
  component: LLM Response Handler
  threat: Unsanitized LLM output triggers ReDoS in downstream regex filter
  likelihood: "\u2014"
  impact: "\u2014"
  risk_level: High
  mitigation: Enforce output length cap and use non-backtracking regex engine
  agentic_pattern: none
  source_attribution:
    - {taxonomy: owasp, id: LLM05, relationship: primary}
    - {taxonomy: cwe, id: CWE-1333, relationship: related}

# Finding 2: T1070.001 (MITRE ATT&CK) primary + AML.T0051 (MITRE ATLAS) related
# — exercises MITRE column merge across ATT&CK and ATLAS within one finding.
- id: R-2
  component: Audit Log Service
  threat: Adversary clears authentication logs after prompt-injection-driven access escalation
  likelihood: "\u2014"
  impact: "\u2014"
  risk_level: Critical
  mitigation: Append-only log shipping to immutable storage; alert on audit gaps
  agentic_pattern: none
  source_attribution:
    - {taxonomy: mitre-attack, id: T1070.001, relationship: primary}
    - {taxonomy: mitre-atlas, id: AML.T0051, relationship: related}

# Finding 3: AML.T0018 (MITRE ATLAS) derived — single-record derived
# relationship, exercising the third enum value across a single-citation
# finding on an AI-specific taxonomy.
- id: AG-3
  component: Agent Orchestrator
  threat: Adversary poisons fine-tuning corpus to install latent model backdoor
  likelihood: "\u2014"
  impact: "\u2014"
  risk_level: Medium
  mitigation: Sign-verify corpus artefacts; restrict fine-tune pipelines to allow-listed inputs
  agentic_pattern: none
  source_attribution:
    - {taxonomy: mitre-atlas, id: AML.T0018, relationship: derived}

# Finding 4: A03 (OWASP) primary + CWE-200 (CWE) primary + T1078 (MITRE ATT&CK)
# related — three-taxonomy, 3-record finding — exercises longer per-finding lists.
- id: I-4
  component: User Profile API
  threat: IDOR leaks PII via predictable user IDs in the profile endpoint
  likelihood: "\u2014"
  impact: "\u2014"
  risk_level: High
  mitigation: Enforce object-level authorization; use opaque, unguessable identifiers
  agentic_pattern: none
  source_attribution:
    - {taxonomy: owasp, id: A03, relationship: primary}
    - {taxonomy: cwe, id: CWE-200, relationship: primary}
    - {taxonomy: mitre-attack, id: T1078, relationship: related}

# Finding 5: NO source_attribution — coexists with populated findings above.
# Confirms the aggregator counts "findings with attribution" ≠ "all findings".
