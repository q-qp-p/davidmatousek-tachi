# Synthetic fixture per architect LOW-5: an architecture with a
# fine-tuning pipeline component but only ONE agent.
#
# Expected: multi-agent gate predicate FALSE because:
#   (a) only 1 agentic component (Specialist Agent) — condition a fails
#   (b) no inter-agent data flow (Specialist <-> Fine-Tuning Pipeline
#       is agent <-> non-agent) — condition b fails
#   (c) no "multi-agent" / "swarm" / "supervisor" / "delegation" /
#       "agent mesh" keyword in description — condition c fails
#
# This architecture verifies the scope-boundary edge case: Temporal
# Attacks on single-agent architectures are DELIBERATELY excluded
# (spec Edge Case 4 — "What happens when a single-agent architecture
# contains a fine-tuning pipeline?"). The multi-agent gate predicate
# MUST return FALSE and the classification engine MUST NOT assign
# `temporal_attack` to any finding.

name: single-agent-with-fine-tuning
description: >
  A single-agent system with an LLM reasoning agent and a fine-tuning
  pipeline. The agent handles user queries and the fine-tuning
  subsystem periodically updates the model from user feedback. All
  model updates flow through a single coordinator; there is no peer
  agent and no inter-agent coordination.

components:
  - name: Specialist Agent
    category: agentic
  - name: Fine-Tuning Pipeline
    category: process
  - name: Feedback Store
    category: data_store
  - name: User Interface
    category: process

data_flows:
  - source: User Interface
    target: Specialist Agent
  - source: Specialist Agent
    target: Feedback Store
  - source: Feedback Store
    target: Fine-Tuning Pipeline
  - source: Fine-Tuning Pipeline
    target: Specialist Agent
