# F-5 Cat 12 — LLM Inference-Request Flooding and Token Exhaustion (D-{N})
# Schema: schemas/finding.yaml v1.8 (unchanged in F-5)
# Category: denial-of-service
# Severity: HIGH (Q3 default for Cat 12 — MEDIUM-HIGH)
# Worked example: multi-tenant LLM-serving SaaS without per-tenant QPS rate limit
id: "D-99"
category: denial-of-service
component: "LLM Inference Gateway (/v1/completions)"
dfd_element_type: "Process"
threat: "The LLM inference gateway exposes /v1/completions without per-tenant queries-per-second rate limit. An attacker registers free-tier accounts and floods the endpoint with concurrent requests, exhausting inference compute capacity and causing latency degradation for paying tenants. Tenant isolation breaks down at the inference-compute layer; the SaaS's denial-of-wallet exposure compounds with the availability degradation. This is LLM-tier inference exhaustion distinct from generic infrastructure DoS — the mitigation surface is LLM-API-gateway-level, not network-layer."
likelihood: HIGH
impact: HIGH
risk_level: Critical
mitigation: "Per-tenant queries-per-second rate limit at the API gateway (per-API-key budget enforced before the inference call begins). Prompt-size cap (max-prompt-token enforcement) applied at gateway with rejection at 4xx HTTP status. Per-tenant token budget per request with hard-cap (e.g., 4k output tokens for free tier, 16k for premium). Token-counting middleware with anomaly alerting on per-tenant token-velocity spikes (sliding-window over 1-minute and 5-minute windows). Request-timeout configured for LLM-call latency tail (p99 > 30s for context-window-heavy requests) — distinguish from infrastructure-tier slow paths."
references:
  - "OWASP LLM10:2025 — Unbounded Consumption"
  - "CWE-400 Uncontrolled Resource Consumption"
  - "CWE-770 Allocation of Resources Without Limits or Throttling"
maestro_layer: "L7"
agentic_pattern: "none"
source_attribution: []
