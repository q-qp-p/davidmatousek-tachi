# Worked example: RAG advisory assistant with recursive chain-of-thought response
id: "LLM-50"
category: llm
component: "RAG Advisory Assistant Inference API"
dfd_element_type: "Process"
threat: "The RAG advisory assistant accepts a 10-token user prompt that triggers a recursive chain-of-thought response, generating 32k tokens of self-amplifying output without an intermediate-step cap. The operator's inference cost per query exceeds the revenue per query by 100x; sustained attack drives the operator's monthly bill to financial ruin without degrading availability for other tenants — the cost is the attack surface, not the uptime. This is cost-amplification specific attack vector distinct from model-theft Cat 6 (per-tenant quota / cost-control / billing-attribution gaps at the abstraction level)."
likelihood: HIGH
impact: HIGH
risk_level: Critical
mitigation: "Per-query output-token cap tuned to realistic response-length p99 (e.g., 4k tokens — well above legitimate p95 but below catastrophic recursive expansion). Recursive-prompt depth limit at the inference-runtime layer (max chain-of-thought iterations, max self-reference depth). Output-amplification-ratio monitoring with anomaly alerting on per-query velocity spikes (output-token / input-token ratio > 100x flagged). Cost-per-query p99 alerting tied to per-tenant billing attribution (cost-velocity monitoring). Per-tenant cost-amplification anomaly detection. Cf. MITRE ATT&CK T1496 Resource Hijacking — text-only cross-reference (NOT in references; T1496 not catalog-resolvable in schemas/taxonomy/mitre-attack.yaml)."
references:
  - "OWASP LLM10:2025 — Unbounded Consumption"
  - "OWASP LLM03:2025 — Supply Chain"
maestro_layer: "L7"
agentic_pattern: "none"
source_attribution: []
