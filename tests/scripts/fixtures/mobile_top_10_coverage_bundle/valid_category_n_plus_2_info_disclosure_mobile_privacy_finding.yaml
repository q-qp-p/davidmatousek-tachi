# Worked example: mobile-banking app caching account-balance data without TTL +
#                 missing FLAG_SECURE on the transaction-history screen; recent-apps
#                 switcher snapshots leak balances to anyone with brief device access
id: "I-13"
category: info-disclosure
component: "WellnessBank Android Client"
dfd_element_type: "Process"
threat: "The WellnessBank Android Client caches account-balance data and recent-transaction records in `WellnessBankLocalDB` indefinitely with no TTL expiry — the cache survives until the user manually clears app data, even after long periods of inactivity. The transaction-history Activity ships without `FLAG_SECURE` declared on its `Window`. Telemetry SDKs (analytics + payments) emit user identifiers, screen views, and event metadata without a privacy-consent gate or opt-out toggle. Sensitive fields (account number, OTP) reach the system pasteboard without sensitivity tagging (no `EXTRA_IS_SENSITIVE` on Android 13+ `ClipData`). A user pulls down the recents-screen switcher in a public space (coffee shop, conference, family setting); the recents thumbnail snapshot persists the most recently rendered transaction-history screen including account balance, recipient names, and transfer amounts. Anyone with brief device access — a curious bystander, a partner glancing at the unlocked phone, a shoulder-surfer — captures financial data without ever bypassing the app lock. The same surface also leaves the OTP code visible to recents-screen capture during a pending money-movement confirmation, enabling a co-located adversary to harvest both the balance context and the OTP in a single recents-screen view. This is mobile-specific inadequate privacy controls on a banking-tier client, distinct from generic data-at-rest exposure (Cat 1-9) by the architectural-tell of a declared mobile client component with PII / PHI handling and sensitive-screen rendering gaps."
likelihood: HIGH
impact: MEDIUM
risk_level: Medium
mitigation: "Apply data-minimization on caches with TTL enforcement — set explicit expiry on each cached PII / PHI field (e.g., balance cache 60s TTL with refresh-on-demand, transaction cache 5-minute TTL, contact-list cache invalidated on app pause); evict cached data on app-lock transition. Apply consent-gated telemetry with opt-out — gate every analytics emission behind a documented privacy-consent gate honored on first-launch and reachable in-app at any time; respect platform-tier opt-out signals (iOS App Tracking Transparency, Android Advertising-ID opt-out); honor end-user opt-out within the app's own UI before any telemetry SDK initialization. Apply `FLAG_SECURE` (Android `WindowManager.LayoutParams.FLAG_SECURE`) on every Activity `Window` rendering PII / PHI — transaction history, account balance, OTP / 2FA challenge, health records, payment-card-data screens; mirror on iOS by replacing the foreground content with a privacy-blur view in `applicationWillResignActive(_:)` so recents-screen snapshots show no sensitive content. Apply just-in-time permission prompts with graceful denial paths — request runtime permissions only when the user-driven flow that needs them begins. Apply clipboard sensitivity tagging — set `EXTRA_IS_SENSITIVE=true` on `ClipData` for any clipboard write on Android 13+; use `UIPasteboard` `.localOnly` option on iOS. Document the mobile privacy choices in mobile threat-modeling artifacts (MASTG-PRIVACY / MASVS-PRIVACY section-level cross-reference)."
references:
  - "OWASP M6:2024 — Inadequate Privacy Controls"
maestro_layer: "L1"
agentic_pattern: "none"
source_attribution: []
