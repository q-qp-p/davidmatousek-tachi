# F-7 Cat N+2 — Inadequate Mobile Privacy Controls (I-{N})
# Schema: schemas/finding.yaml v1.8 (unchanged in F-7)
# Category: info-disclosure
# Severity: MEDIUM (default per ADR-036 mapping table for M6; mobile privacy gaps
#                  on PII-rendering screens with no FLAG_SECURE and unbounded local
#                  cache of account-balance data)
# OWASP M6:2024 cross-reference: included in references array (catalog-resolvable in
#   schemas/taxonomy/owasp.yaml per Wave 1.0 T012 verification)
