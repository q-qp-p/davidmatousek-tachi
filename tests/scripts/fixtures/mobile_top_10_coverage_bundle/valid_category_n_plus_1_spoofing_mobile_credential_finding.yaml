# F-7 Cat N+1 — Improper Mobile Credential Usage (S-{N})
# Schema: schemas/finding.yaml v1.8 (unchanged in F-7)
# Category: spoofing
# Severity: HIGH (default per ADR-036 mapping table for M1; banking credentials persisted
#                outside Android Keystore on a money-movement-capable mobile client)
# OWASP M1:2024 cross-reference: included in references array (catalog-resolvable in
#   schemas/taxonomy/owasp.yaml per Wave 1.0 T012 verification)
# MASTG-AUTH / MASVS-CRYPTO cross-reference: prose-only mention in mitigation; NOT in
#   references array (section-level granularity per Q4 plan-time RESOLVED — not
#   catalog-resolvable for F-7; F-A1 follow-on owns MASTG taxonomy)
# Worked example: mobile-banking app persisting login credentials in SharedPreferences
#                 with MODE_PRIVATE rather than EncryptedSharedPreferences from Android
#                 Jetpack Security
id: "S-8"
category: spoofing
component: "WellnessBankCredentialCache"
dfd_element_type: "Data Store"
threat: "The WellnessBank Android Client persists session and OAuth refresh tokens into the WellnessBankCredentialCache (Android SharedPreferences in MODE_PRIVATE) rather than EncryptedSharedPreferences from the Android Jetpack Security library or an Android Keystore-backed credential vault. The mobile binary contains no reference to the AndroidKeyStore provider, no biometric-bound key release for sensitive operations, and no credential rotation policy on the device-resident refresh token. An attacker recovering a lost or rooted handset dumps the app's data partition, extracts the long-lived refresh token, and authenticates against the production banking API as the legitimate user — without ever defeating biometric step-up, since no biometric-bound key gates the credential. This is mobile-specific improper credential usage on a banking-tier client, distinct from generic web/API credential theft (Cat 1-7) by the architectural-tell of credentials persisted on a mobile device outside platform-managed secure storage."
likelihood: HIGH
impact: HIGH
risk_level: High
mitigation: "Persist credentials only via platform-managed secure storage: Android Keystore + EncryptedSharedPreferences (Jetpack Security) on Android; iOS Keychain with kSecAttrAccessibleAfterFirstUnlockThisDeviceOnly or stricter on iOS. Bind sensitive-operation key release to biometric authentication (BiometricPrompt.CryptoObject + StrongBox-backed keys on Android; LAContext + Secure-Enclave-bound keys on iOS) so the refresh token cannot be recovered from a stolen device without a live biometric match. Rotate session and refresh tokens on each use with server-side revocation cache; eliminate hardcoded API keys from shipped mobile binaries by issuing per-device credentials at first launch with Play Integrity / DeviceCheck attestation. Document credential-lifecycle and storage choices in mobile threat-modeling artifacts (MASTG-AUTH / MASVS-CRYPTO section-level cross-reference)."
references:
  - "OWASP M1:2024 — Improper Credential Usage"
maestro_layer: "L1"
agentic_pattern: "none"
source_attribution: []
