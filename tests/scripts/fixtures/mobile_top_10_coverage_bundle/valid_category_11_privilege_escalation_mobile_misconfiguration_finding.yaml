# F-7 Cat 11 — M8 Privilege-Gain Variant: Mobile Security Misconfiguration (E-{N})
# Schema: schemas/finding.yaml v1.8 (unchanged in F-7)
# Category: privilege-escalation
# Severity: HIGH (default per ADR-036 mapping table for M8 privilege-gain variant;
#                debug ContentProvider exposed on a release-build mobile-banking
#                client with no app-attestation on transaction-confirmation paths)
# OWASP M8:2024 cross-reference: included in references array (catalog-resolvable in
#   schemas/taxonomy/owasp.yaml per Wave 1.0 T012 verification)
# CWE-732 cross-reference: included in references array (catalog-resolvable per
#   pre-existing Primary Sources list in tachi-privilege-escalation companion file)
# OWASP MASVS-PLATFORM cross-reference: included in references array as section-level
#   granularity citation per F-7 ADR-036 D-3 mapping table
# MITRE ATT&CK Mobile T1626 cross-reference: prose-only mention in mitigation; NOT
#   in references array (catalog-absent per ADR-036 D-7 Q3 RESOLVED 3-of-3
#   prose-only at four-or-five-agent worst-case scale)
# Worked example: mobile-banking app retaining a debug ContentProvider in its
#                 release build (`MoneyTransferDebugProvider` with android:exported="true"
#                 and no android:permission attribute), paired with missing Play Integrity
#                 API on the confirmMoneyTransfer() server-side call path
id: "E-10"
category: privilege-escalation
component: "MoneyTransferDebugProvider"
dfd_element_type: "Process"
threat: "The WellnessBank Android Client retains a debug-only `MoneyTransferDebugProvider` ContentProvider in its release-build APK because the release-flavor build configuration was not migrated when the team added the provider for QA acceptance testing. The provider declares `android:exported=\"true\"` without an `android:permission` attribute, intended (in development) for the QA harness to seed transfer state. The app also has no Play Integrity API integration on its `confirmMoneyTransfer()` server-side call path, which trusts the client's signed JWT for caller-identity but does not verify the calling client's binary integrity or device-platform integrity. An attacker on a rooted device installs a malicious companion app from a third-party app store; the malicious app invokes `MoneyTransferDebugProvider` via `ContentResolver.query(...)` and reads pending-transfer state including session tokens that the QA harness needed for test seeding. The malicious app then issues a `confirmMoneyTransfer()` request to the production banking API using the harvested session token. The server accepts the call because the JWT is valid and there is no Play Integrity attestation header to reject; the transfer completes. Two interlocking misconfigurations chained: the exposed debug ContentProvider for token harvest, and the missing app-attestation for binary-integrity verification. This is mobile-specific misconfiguration enabling privilege gain on a banking-tier client, distinct from generic server-side IDOR / role-confusion (Cat 1-10) by the architectural-tell of declared mobile client components with manifest-level export declarations and missing mobile-attestation surface."
likelihood: HIGH
impact: HIGH
risk_level: Critical
mitigation: "Strip debug routes / debug ContentProviders / debug Activities from release builds via build-flavor configuration — Android Gradle `buildTypes.release { ... }` blocks excluding debug-only AndroidManifest entries; iOS conditional compilation flags excluding debug-only URL schemes; build-time validation that asserts no `*Debug*` named components ship in release artifacts. Enforce permission-gated ContentProvider / Service exports — set `android:exported=\"false\"` on all components NOT requiring cross-app invocation; for components that DO require cross-app invocation, declare `android:permission` with a signature-level permission (only apps signed by the same key can invoke) or a runtime permission with appropriate `protectionLevel`. Integrate Play Integrity API (Android) / DeviceCheck (iOS) on transaction-confirmation paths — generate an attestation token client-side, attach it to the privileged-operation request, verify the attestation server-side BEFORE executing the privileged operation; reject requests with absent / expired / failed-attestation tokens. Integrate root-detection via Play Integrity attestation as the primary signal; degrade UX or block the privileged feature on rooted / jailbroken devices per the threat-model risk acceptance. Audit `<intent-filter>` declarations across the AndroidManifest — for every Activity / Service / Receiver that handles a privileged operation, verify either `android:exported=\"false\"` OR explicit caller-verification (calling-package check via `getCallingPackage()`, signature-level permission, signed deep-link payload with HMAC verification at intent-receipt time). Enable R8 (Android) on release builds with full obfuscation; protect the `mapping.txt` symbol file in private artifact storage NOT shipped to production. MITRE ATT&CK Mobile T1626 (Abuse Elevation Control Mechanism — Mobile sub-technique) describes this abuse pattern; defenders should monitor for in-app intent invocations from unexpected calling packages and emit telemetry events on debug-component invocations (which should be zero in production)."
references:
  - "OWASP M8:2024 — Security Misconfiguration"
  - "CWE-732 — Incorrect Permission Assignment for Critical Resource"
  - "OWASP MASVS-PLATFORM — Mobile Application Security Verification Standard, Platform Interaction Requirements"
maestro_layer: "L1"
agentic_pattern: "none"
source_attribution: []
