# F-7 Cat N+3 — Insecure Mobile Data Storage (I-{N})
# Schema: schemas/finding.yaml v1.8 (unchanged in F-7)
# Category: info-disclosure
# Severity: HIGH (default per ADR-036 mapping table for M9; banking-tier mobile client
#                with unencrypted SQLite transaction-history database and allowBackup="true"
#                exposing the local DB to Google Drive cloud-backup)
# OWASP M9:2024 cross-reference: included in references array (catalog-resolvable in
#   schemas/taxonomy/owasp.yaml per Wave 1.0 T012 verification)
# MASTG-STORAGE / MASVS-STORAGE cross-reference: prose-only mention in mitigation; NOT in
#   references array (section-level granularity per Q4 plan-time RESOLVED — not
#   catalog-resolvable for F-7; F-A1 follow-on owns MASTG taxonomy)
# Worked example: mobile-banking app storing transaction history in unencrypted SQLite
#                 without allowBackup="false" → cloud-backup exfiltration via Google Drive
#                 automatic-restore on a new device after Google account compromise
id: "I-14"
category: info-disclosure
component: "WellnessBankLocalDB"
dfd_element_type: "Data Store"
threat: "The WellnessBankLocalDB is an on-device SQLite database holding transaction history and cached account snapshots without SQLCipher / Realm encryption — sensitive transaction data persists in plaintext within the app's internal-storage data partition. The application manifest declares `allowBackup=\"true\"` (the platform default), with no per-table `BackupAgent` exclusion rules and no `<backup-rules>` declaration on Android 12+. Companion stores (`WellnessBankCredentialCache` SharedPreferences in `MODE_PRIVATE`) hold authentication tokens in plaintext rather than `EncryptedSharedPreferences` from the Android Jetpack Security library. The user enables Google Drive auto-backup on the device for normal continuity reasons. Months later, the user's device is lost; the user buys a new device and authenticates with the same Google account; Android's automatic-restore copies the entire `WellnessBankLocalDB` payload from Google Drive backup into the new device. An attacker who later compromises the user's Google account (credential-stuffing, password reuse from a separate breach) can trigger an automatic-restore on an attacker-controlled device and recover the full transaction history without ever bypassing the original device's lock screen, biometric, or app-tier authentication. The breach surface is the cloud-backup channel, not the original device — yet the data leakage is the same. This is mobile-specific insecure data storage on a banking-tier client, distinct from generic data-at-rest exposure (Cat 1-9) by the architectural-tell of a declared mobile client component with device-resident data persistence outside platform-managed encrypted storage."
likelihood: HIGH
impact: HIGH
risk_level: High
mitigation: "Encrypt all device-resident databases via SQLCipher (Android) / Realm encryption (cross-platform) / Core Data with NSFileProtectionComplete (iOS); derive the database key from platform-keyring-bound material (Android Keystore-backed AES wrapping; iOS Keychain with appropriate access-control protection class) rather than from a static or user-PIN-derived key alone. Apply `EncryptedSharedPreferences` (Android Jetpack Security) for all KeyValue persistence of tokens, session identifiers, or other security-relevant fields; use Keychain-stored secrets on iOS with `kSecAttrAccessibleAfterFirstUnlockThisDeviceOnly` or stricter. Set `allowBackup=\"false\"` on Android with sensitive-data partitioning OR define explicit `<backup-rules>` (Android 12+) that exclude sensitive databases / preferences from cloud-backup; on iOS, set `URL.isExcludedFromBackupKey = true` on the file URLs of sensitive databases / preferences before first write. Restrict sensitive file writes to internal storage only (`Context.getFilesDir()` / `Context.getNoBackupFilesDir()` on Android; document directory with explicit backup exclusion on iOS); reject any path resolution that resolves to external storage on sensitive files. Migrate to scoped-storage on Android 11+ (`MediaStore` API or `SAF` for shareable files; private app-specific directories for per-app files); reject `MODE_WORLD_READABLE` / `MODE_WORLD_WRITEABLE` on file streams. Document the mobile secure-storage choices in mobile threat-modeling artifacts (MASTG-STORAGE / MASVS-STORAGE section-level cross-reference)."
references:
  - "OWASP M9:2024 — Insecure Data Storage"
maestro_layer: "L1"
agentic_pattern: "none"
source_attribution: []
