# OWASP Catalog (taxonomy: owasp)
#
# Composition per FR-020 (6 OWASP lists, ≥60 items total):
#   - Top 10:2021 (10 items: A01-A10)
#   - API Security Top 10:2023 (10 items: API1-API10)
#   - Top 10 for Agentic Applications:2026 (10 items: ASI01-ASI10)
#   - LLM Top 10:2025 (10 items: LLM01-LLM10)
#   - Mobile Top 10:2024 (10 items: M1-M10)
#   - ML Security Top 10:2023 (10 items: ML01-ML10)
#
# Record shape per FR-003: {id, full_id, name, url, cwe_refs}.
# `cwe_refs` populated ONLY where the OWASP source explicitly publishes CWE
# cross-references (FR-008 unidirectional OWASP->CWE rule). `cwe_refs: []` where
# OWASP does not publish them (LLM, ASI, ML, Mobile, API lists at spec time).
#
# Top 10:2021 CWE mappings sourced from per-category OWASP pages (the
# "List of Mapped CWEs" section). A01/A02/A03 lists include the top 10 most
# commonly-cited CWEs from the full published list; full CWE coverage lives
# in crosswalk.yaml (where A-category<->CWE edges carry 'citation: URL').
#
# Sorted alphabetically by `id` per FR-032.
#
# F-241 Wave 3.2 record-shape extension (per ADR-037 D-7, acknowledged by
# Architect MEDIUM-A): every record now carries two additional optional
# fields — `out_of_scope: bool` (default `false`) and
# `out_of_scope_rationale: string` (default `""`). All 60 OWASP records are
# IN-SCOPE for tachi design-time threat modeling — none are runtime/IR-only —
# so all 60 records carry `out_of_scope: false` defaults. Backward-compat
# preserved via YAML defaults: pre-F-241 readers that omit these fields parse
# correctly. The Out-of-Scope exclusion mechanism applies primarily to
# `mitre-attack.yaml` tactical groupings (TA0005 / TA0007 / TA0008 / TA0009 /
# TA0010 / TA0011 / TA0040 — Wave 4.1+4.2 scope) and to per-item runtime-only
# `mitre-atlas.yaml` techniques (Wave 3.2 T039 scope).
#
# F-241 Wave 3.2 citation-completeness audit-trail (per ADR-037 D-6, BLP-01
# §8 Quality Bar): the `# citation:` comment immediately above each record
# attests at least one tachi detection-tier host agent + at least one
# detection-pattern category covering the OWASP entry. Citation chains
# follow the F-1 .. F-7 ADR closures (ADR-030 / ADR-031 / ADR-032 / ADR-033 /
# ADR-034 / ADR-035 / ADR-036) and the F-241 Wave 2.1-3.1 closures (T025 /
# T026 / T028 / T029 / T030 / T031). See ADR-037 §Audit-trail.

