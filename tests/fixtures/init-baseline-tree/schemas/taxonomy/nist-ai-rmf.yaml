# NIST AI RMF Catalog (taxonomy: nist-ai-rmf)
#
# Composition: NIST AI RMF 1.0 (NIST AI 100-1, January 2023) Core Subcategories
# as enumerated in Tables 1-4 (GOVERN / MAP / MEASURE / MANAGE functions).
#
# Record shape per FR-003: {id, full_id, name, url, cwe_refs}.
# `cwe_refs: []` for all records — NIST AI RMF does not publish direct CWE
# cross-references; RMF->CWE relationships live in crosswalk.yaml.
#
# URL pattern per FR-033 canonical convention: every record shares the NIST
# DOI `https://doi.org/10.6028/NIST.AI.100-1` (the DOI resolves to the
# document containing all 4 tables; per-Subcategory section anchors are
# not stable across NIST publication revisions).
#
# IDs follow the NIST publication format: `<FUNCTION> <C>.<SC>` (uppercase
# function, space separator, dotted category.subcategory). Example: `MEASURE 2.7`.
# `full_id` format: `NIST-AI-RMF-<ID>` (e.g., `NIST-AI-RMF-MEASURE-2.7`).
#
# SPEC AMENDMENT NOTE (2026-04-17) — FR-021 amended 68→72 at SHA 9da377c:
#   The authoritative NIST AI RMF 1.0 Subcategory catalog (airc.nist.gov
#   playbook pages for Govern/Map/Measure/Manage fetched 2026-04-17)
#   enumerates 72 Subcategories across AI RMF 1.0 Tables 1-4:
#     GOVERN : 19 (1.1-1.7, 2.1-2.3, 3.1-3.2, 4.1-4.3, 5.1-5.2, 6.1-6.2)
#     MAP    : 18 (1.1-1.6, 2.1-2.3, 3.1-3.5, 4.1-4.2, 5.1-5.2)
#     MEASURE: 22 (1.1-1.3, 2.1-2.13, 3.1-3.3, 4.1-4.3)
#     MANAGE : 13 (1.1-1.4, 2.1-2.4, 3.1-3.2, 4.1-4.3)
#     Total  : 72
#   FR-021 originally pinned the count at 68 (AI RMF 1.0 initial publication
#   Jan 2023 historical reference). Day 2 harvest surfaced the authoritative
#   count differs: MEASURE 2.12, MEASURE 2.13, and 2 others were added in
#   subsequent NIST playbook expansions. Under FR-024 primary-source-
#   correction discipline, amending the spec to 72 was chosen over
#   descoping to 68 — F-A1 is a verbatim transcription feature, not a
#   re-authorship feature. Both Architect and PM concurred on path (a)
#   (spec amendment vs. catalog descope) per:
#     - .aod/results/architect.md (CHANGES_REQUESTED → path (a))
#     - .aod/results/product-manager.md (APPROVED → path (a))
#   Existing `nist-ai-rmf-mapping.md` Surface B/C cited Subcategories
#   (MAP 4.2, MEASURE 2.6-2.10, MANAGE 1.3, MANAGE 2.4, GOVERN 1.4) are
#   within the 68-subset ⊂ 72-superset — FR-022 transcription fidelity
#   preserved; no ADR-025 / nist-ai-rmf-mapping.md edits required.
#
# Sorted alphabetically by `id` per FR-032 (Python string-sort semantics:
# GOVERN < MANAGE < MAP < MEASURE, then numeric ordering within function).

