#
# Record shape per FR-003: {id, full_id, name, url}.
# NO `cwe_refs` FIELD on CWE records (FR-003 explicit exclusion): CWE->CWE
# relationships (e.g., superseded, related) live ONLY in `crosswalk.yaml`,
# NOT as `cwe_refs` on these records.
#
# URL pattern: https://cwe.mitre.org/data/definitions/<N>.html
#
# Sorted alphabetically by `id` per FR-032 (Python string-sort semantics:
# `sorted(['CWE-20', 'CWE-100'])` → `['CWE-100', 'CWE-20']`).

