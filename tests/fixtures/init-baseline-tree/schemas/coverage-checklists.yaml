# Coverage Checklists Schema
#
# Defines minimum required threat categories per DFD element type.
# Used by the coverage gate (Phase 4) to verify that all required
# threat categories have been evaluated for each component in the
# architecture, preventing blind spots from LLM non-determinism.
#
# Producers: manual authoring (static configuration)
# Consumers: agents/tachi/orchestrator.md (Phase 3b coverage gate)
#
# Version: 1.0

schema_version: "1.0"

coverage_checklist:
  component_type:
    type: string
    description: >
      DFD element type or AI subtype. Standard DFD types are
      matched by dfd_element_type. AI subtypes are detected via
      keyword matching on component names and descriptions.

  required_categories:
    type: list[string]
    description: >
      Minimum threat categories that must be evaluated for this
      component type. Each category maps to a specific threat agent.

# Component Type Mappings
#
# Standard DFD element types and their required STRIDE categories,
# plus AI subtypes with extended category requirements.
#
# Detection rules:
# - Standard types: matched by dfd_element_type field in architecture
# - LLM Process: Process with keywords (llm, language model, gpt, claude, ai model, inference)
# - MCP Server: Process with keywords (mcp, model context protocol, tool server, plugin host)
component_types:
  external_entity:
    dfd_element_type: "External Entity"
    required_categories:
      - spoofing
      - repudiation

  process:
    dfd_element_type: "Process"
    required_categories:
      - spoofing
      - tampering
      - repudiation
      - info-disclosure
      - denial-of-service
      - privilege-escalation

  data_store:
    dfd_element_type: "Data Store"
    required_categories:
      - tampering
      - info-disclosure
      - denial-of-service

  data_flow:
    dfd_element_type: "Data Flow"
    required_categories:
      - tampering
      - info-disclosure
      - denial-of-service

  llm_process:
    dfd_element_type: "Process"
    ai_subtype: true
    detection_keywords:
      - llm
      - language model
      - gpt
      - claude
      - ai model
      - inference
    required_categories:
      # All standard Process categories
      - spoofing
      - tampering
      - repudiation
      - info-disclosure
      - denial-of-service
      - privilege-escalation
      # AI-specific categories
      - llm

  mcp_server:
    dfd_element_type: "Process"
    ai_subtype: true
    detection_keywords:
      - mcp
      - model context protocol
      - tool server
      - plugin host
    required_categories:
      # All standard Process categories
      - spoofing
      - tampering
      - repudiation
      - info-disclosure
      - denial-of-service
      - privilege-escalation
      # AI-specific categories
      - agentic

# Validation Rules
#
# 1. Every component in the architecture must be assigned exactly one
#    component_type based on its dfd_element_type and keyword detection
# 2. AI subtype detection takes precedence over standard type when
#    keywords match (e.g., an LLM Process gets llm_process, not process)
# 3. Required categories are minimum requirements — additional categories
#    discovered during analysis are always accepted
# 4. Coverage gate flags missing categories as warnings, not errors
# 5. Targeted re-analysis runs once per gap (no retry loop)

# Category-to-Agent Mapping
#
# Maps each required category to the threat agent responsible for
# producing findings in that category.
#
# | Category             | Agent                    |
# |----------------------|--------------------------|
# | spoofing             | tachi-spoofing           |
# | tampering            | tachi-tampering          |
# | repudiation          | tachi-repudiation        |
# | info-disclosure      | tachi-info-disclosure    |
# | denial-of-service    | tachi-denial-of-service  |
# | privilege-escalation | tachi-privilege-escalation |
# | agentic              | tachi-tool-abuse, tachi-agent-autonomy |
# | llm                  | tachi-prompt-injection, tachi-data-poisoning, tachi-model-theft |
