# Output Structure Schema
#
# Defines the complete structure of a threat model output
# (threats.md). Validates that generated outputs contain all
# required sections with correct structure.
#
# Producers: Template engine (applying IR findings to output template)
# Consumers: Integrators, SARIF export (F-006), downstream features
#
# Version: 1.1

schema_version: "1.1"

output:
  frontmatter:
    required: true
    fields:
      schema_version:
        type: string
        value: "1.1"
      date:
        type: string
        format: "YYYY-MM-DD"
      input_format:
        type: string
        enum:
          - ascii
          - free-text
          - mermaid
          - plantuml
          - c4
      classification:
        type: string
        default: confidential

  sections:
    - name: System Overview
      required: true
      description: >
        Parsed summary of the architecture input including
        identified components, data flows, and technologies.
      contains:
        - components_list
        - data_flows
        - technologies

    - name: Trust Boundaries
      required: true
      description: >
        Identified trust zones and boundary crossings
        derived from the architecture input.
      contains:
        - zone_names
        - boundary_crossings

    - name: STRIDE Tables
      required: true
      count: 6
      description: >
        One table per STRIDE category containing threat
        findings for each applicable component.
      categories:
        - Spoofing
        - Tampering
        - Repudiation
        - Information Disclosure
        - Denial of Service
        - Elevation of Privilege
      row_fields:
        - id
        - component
        - threat
        - likelihood
        - impact
        - risk_level
        - mitigation

    - name: AI Threat Tables
      required: true
      count: 2
      description: >
        Threat findings from AI-specific agents, grouped
        by agent category.
      categories:
        - Agentic (AG)
        - LLM
      row_fields:
        - id
        - component
        - threat
        - owasp_reference
        - likelihood
        - impact
        - risk_level
        - mitigation

    - name: Correlated Findings
      required: true
      description: >
        Cross-agent correlation groups where findings from different
        categories target the same component for related threats.
        Appears as Section 4a between AI Threat Tables and Coverage Matrix.
      row_fields:
        - group_id
        - findings
        - component
        - threat_summary
        - risk_level

    - name: Coverage Matrix
      required: true
      description: >
        Cross-reference matrix showing which components
        were analyzed for which threat categories.
        Cell values use deduplicated counts where correlation
        groups count as 1 finding per component-category pair.
      structure: "rows=components, columns=S/T/R/I/D/E/AG/LLM, cells=deduplicated_finding_count; three-state model: integer (deduplicated count), '—' (analyzed-but-clean), 'n/a' (not-applicable)"
      dedup_note: >
        When correlation groups exist, the coverage matrix appends
        a footnote: "Counts reflect deduplicated findings. N correlation
        groups merged M individual findings."

    - name: Risk Summary
      required: true
      description: >
        Aggregate counts of findings by risk level,
        computed using the OWASP 3x3 matrix.
      levels:
        - Critical
        - High
        - Medium
        - Low
        - Note
      fields:
        - count
        - percentage

    - name: Recommended Actions
      required: true
      description: >
        Prioritized list of findings sorted by risk level
        descending, providing a remediation roadmap.
      sort_order: "risk_level descending"
      fields:
        - finding_id
        - status
        - component
        - maestro_layer
        - threat
        - risk_level
        - mitigation

# Naming Convention
#
# Output files follow: YYYY-MM-DD-{phase}/threats.md
# Outputs are immutable once generated.

# SARIF Severity Mapping
#
# | Risk Level | SARIF Severity | CVSS Score Range |
# |-----------|---------------|-----------------|
# | Critical  | error         | 9.0-10.0        |
# | High      | error         | 7.0-8.9         |
# | Medium    | warning       | 4.0-6.9         |
# | Low       | note          | 0.1-3.9         |
# | Note      | note          | 0.1             |
