# Docker Compose — Local Development Only
#
# Usage:
#   cp .env.example .env    # configure environment variables
#   docker compose up -d    # start all services
#   docker compose logs -f  # follow logs
#   docker compose down     # stop services
#   docker compose down -v  # stop and remove volumes (destroys data)
#
# Services:
#   db       — PostgreSQL 16 (port 5432)
#   backend  — FastAPI + uvicorn with hot-reload (port 8000)
#   frontend — React + Vite dev server with hot-reload (port 5173)
#
# IMPORTANT: This file is for local development only.
# NEVER use docker-compose.yml for production deployment.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    # Add a Dockerfile at backend/Dockerfile for container builds.
    # Minimal example:
    #   FROM python:3.12-slim
    #   COPY --from=ghcr.io/astral-sh/uv:latest /uv /usr/local/bin/uv
    #   WORKDIR /app
    #   COPY pyproject.toml uv.lock ./
    #   RUN uv sync --frozen
    #   COPY . .
    #   CMD ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    build:
      context: ./backend
    ports:
      - "8000:8000"
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      DEBUG: ${DEBUG:-true}
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    # Add a Dockerfile at frontend/Dockerfile for container builds.
    # Minimal example:
    #   FROM node:22-alpine
    #   WORKDIR /app
    #   COPY package.json package-lock.json ./
    #   RUN npm ci
    #   COPY . .
    #   CMD ["npm", "run", "dev", "--", "--host"]
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    command: npm run dev -- --host
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
