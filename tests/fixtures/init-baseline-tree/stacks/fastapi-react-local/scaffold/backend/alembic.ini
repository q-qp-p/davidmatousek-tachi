# Alembic configuration file.
#
# The sqlalchemy.url value below is a placeholder. In practice,
# env.py reads DATABASE_URL from the environment, so this value
# is only used as a fallback during local development.

[alembic]
script_location = alembic
prepend_sys_path = .

# Placeholder -- overridden by env.py reading DATABASE_URL from environment.
sqlalchemy.url = sqlite+aiosqlite:///./data/app.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
