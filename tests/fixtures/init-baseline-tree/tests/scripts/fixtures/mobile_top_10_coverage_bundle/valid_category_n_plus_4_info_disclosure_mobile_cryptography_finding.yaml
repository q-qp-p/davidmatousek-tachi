# F-7 Cat N+4 — Insufficient Mobile Cryptography (I-{N})
# Schema: schemas/finding.yaml v1.8 (unchanged in F-7)
# Category: info-disclosure
# Severity: HIGH (default per ADR-036 mapping table for M10; banking-tier mobile client
#                deriving encryption keys from a 4-digit PIN with PBKDF2 iteration count
#                of 1000 and no salting — entire 10,000-PIN keyspace brute-forceable in
#                seconds against the encrypted credential store on an exfiltrated device)
# OWASP M10:2024 cross-reference: included in references array (catalog-resolvable in
#   schemas/taxonomy/owasp.yaml per Wave 1.0 T012 verification)
# MASTG-CRYPTO / MASVS-CRYPTO cross-reference: prose-only mention in mitigation; NOT in
#   references array (section-level granularity per Q4 plan-time RESOLVED — not
#   catalog-resolvable for F-7; F-A1 follow-on owns MASTG taxonomy)
# Worked example: mobile-banking app deriving encryption keys from a 4-digit PIN with
#                 PBKDF2-HMAC-SHA1 iteration count 1000 + no salt → 10,000-PIN keyspace
#                 brute-force in under a second on commodity GPU hardware
id: "I-15"
category: info-disclosure
component: "WellnessBank Android Client"
dfd_element_type: "Process"
threat: "The WellnessBank Android Client derives the encryption key for its on-device credential vault from the user's 4-digit PIN via PBKDF2-HMAC-SHA1 with an iteration count of 1000 and no salting. The total PIN keyspace is 10,000 values. The mobile binary additionally contains hardcoded symmetric keys visible via `strings` extraction, uses `java.util.Random` (rather than `SecureRandom`) for IV generation in a custom session-token issuance routine, and applies a custom-rolled XOR-with-constant routine for telemetry payload \"obfuscation\" mistaken for confidentiality control. An attacker recovers a stolen device, dumps the encrypted credential vault from the app's data partition, and runs an offline brute-force against the encrypted vault: PBKDF2-HMAC-SHA1 at 1000 iterations costs roughly a microsecond per candidate on commodity GPU hardware, so the entire 10,000-PIN keyspace is exhausted in under a second. The attacker recovers the vault encryption key, decrypts the persisted refresh tokens, and authenticates against the production banking API as the legitimate user — defeating the entire app-tier credential protection without ever guessing the PIN at the device lock screen. The defect compounds with the unsalted derivation: a precomputed rainbow table for the 1000-iteration PBKDF2-HMAC-SHA1 over the 10,000-PIN space costs trivial storage and reduces the per-device attack to a single table lookup. This is mobile-specific insufficient cryptography on a banking-tier client, distinct from generic cryptographic-failure exposure (Cat 1-9) by the architectural-tell of a declared mobile client component with cryptographic primitives applied to sensitive payloads outside platform-provided crypto APIs."
likelihood: HIGH
impact: HIGH
risk_level: High
mitigation: "Use platform-provided key derivation primitives at adequate cost — Argon2id (preferred) or scrypt (acceptable) for password / PIN derivation, or PBKDF2-HMAC-SHA256 with at least 600,000 iterations as the floor; salt every derivation with a unique per-account / per-device random salt. Use platform crypto APIs only — `AndroidKeyStore` (Android) for key storage and crypto operations bound to hardware-backed keystore where available; `CryptoKit` (iOS) for high-level primitives bound to Secure Enclave; reject any custom-rolled cipher, custom hash, or \"obfuscation\" routine as a substitute for platform-provided cryptography. Derive sensitive keys from platform-keyring-bound material — `StrongBox` (Android Keystore-backed hardware key island) on supported devices; Secure Enclave-bound keys on iOS; combine the user-PIN-derived key with a hardware-bound key in an envelope-encryption scheme so the on-device vault key cannot be recovered offline without the device's hardware module. Use `SecureRandom` (Android) / `SecRandomCopyBytes` (iOS) for all cryptographic randomness — keys, IVs, salts, nonces, session-token entropy, challenge-response material; reject any `java.util.Random` / `arc4random` shortcut on a security path. Require AES-GCM (preferred) or AES-CCM as the symmetric-encryption baseline; require SHA-256 (preferred) or SHA-512 / SHA-3 as the hash baseline; reject DES / 3DES / RC4 / MD5 / SHA1 in any sensitive path. Document the mobile cryptographic-control choices in mobile threat-modeling artifacts (MASTG-CRYPTO / MASVS-CRYPTO section-level cross-reference)."
references:
  - "OWASP M10:2024 — Insufficient Cryptography"
maestro_layer: "L1"
agentic_pattern: "none"
source_attribution: []
