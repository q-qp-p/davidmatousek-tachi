# Invalid OI-{N} finding fixture — Feature 201 (output-integrity threat agent)
#
# Exercises the F-A2 source_attribution referential-integrity rejection path.
# Citation deliberately uses CWE-73 which is NOT present in the F-A1 catalog
# at `schemas/taxonomy/cwe.yaml` at the time of Feature 201. Per FR-007, the
# correct substitute for path-traversal surfaces is CWE-22 (present in the
# catalog); this fixture models the pre-FR-007 incorrect citation to validate
# that `validate_source_attribution` rejects the finding with an actionable
# error.
#
# Test surface: test_output_integrity.py::TestOutputIntegritySourceAttribution
#   - test_invalid_fixture_cites_absent_cwe

id: OI-99
category: llm
severity: medium
component: "Log Archive Writer"
threat: "LLM-synthesized filename passed directly to a filesystem write without canonicalization or an allowlist check on the destination directory, enabling path traversal if the model emits sequences such as '../../etc/logs/override.log' in a filename."
mitigation: "Canonicalize the filename with pathlib.Path.resolve() and enforce that the resolved path is inside an allowlisted directory via is_relative_to() before opening a write handle. Reject filenames containing path separators; generate filesystem names from a deterministic id + sanitized suffix rather than model output."
references:
  - "OWASP LLM05:2025 Improper Output Handling"
  - "CWE-73 External Control of File Name or Path"
source_attribution:
  - taxonomy: owasp
    id: LLM05
    relationship: primary
  - taxonomy: cwe
    id: CWE-73
    relationship: related
