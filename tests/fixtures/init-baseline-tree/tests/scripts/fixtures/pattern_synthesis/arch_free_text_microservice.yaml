# Synthetic Phase 1 abstract for free-text-microservice baseline.
# Expected: multi-agent gate predicate FALSE (no agentic components).

name: free-text-microservice
description: >
  A Python microservice that accepts free-text user input, performs
  input validation, and stores submissions in a Redis cache. The
  service exposes an HTTP endpoint and uses rate limiting to prevent
  abuse.

components:
  - name: Python Service
    category: process
  - name: Redis Cache
    category: data_store
  - name: Rate Limiter
    category: process

data_flows:
  - source: Python Service
    target: Redis Cache
  - source: Python Service
    target: Rate Limiter
