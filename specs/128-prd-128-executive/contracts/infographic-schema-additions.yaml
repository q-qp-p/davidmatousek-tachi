# Schema additions for F-128 — diff to schemas/infographic.yaml
# This file is the contract for the schema update. It is NOT inserted into
# infographic.yaml verbatim — instead, the existing template enumeration is
# extended with the entries shown below.

# Add to: templates: enumeration list
new_template:
  name: executive-architecture
  alias: exec
  purpose: |
    Executive-audience layered architecture diagram with narrative threat
    callouts. Designed for placement on early pages of the PDF security report
    so CISOs and other executive readers see the most critical threat
    visualization within the first few pages they actually read.
  positioning_in_pdf: |
    When generated, the executive-architecture image is placed immediately
    after the Executive Summary page and immediately before the Attack Path
    Analysis section in the compiled PDF report. Conditional on the
    has-executive-architecture boolean flag in report-data.typ.
  output_artifacts:
    spec_file: threat-executive-architecture-spec.md
    image_file: threat-executive-architecture.jpg

# Add to: spec_sections enumeration (or extend existing per-template structure)
spec_sections:
  - name: Metadata
    purpose: Template name, tier source, source file, timestamp, qualifying layer count, total filtered count, skip-image flag
    required: true
  - name: Architecture Layers
    purpose: Ordered list of architectural layers (trust zones or DFD type fallback) with component names and counts
    required: true
  - name: Threat Callouts
    purpose: One callout per layer that has a Critical/High finding; each callout contains finding ID, severity, raw description, optional composite score
    required: true
  - name: Severity Distribution
    purpose: Critical and High counts only (filtered from full distribution); total qualifying and total after layer dedup
    required: true
  - name: Visual Layout Directives
    purpose: Portrait orientation, layer order (untrusted at top), pastel layer fills, red dashed-border callouts with warning icons, large readable typography
    required: true
  - name: Gemini Prompt Construction Notes
    purpose: Guidance for the agent on how to instruct Gemini to render the layered diagram with overlay callouts and rewrite raw descriptions to ≤25 words plain English
    required: true

# Visual design directives specific to executive-architecture
visual_directives:
  orientation: portrait
  page_aspect_ratio: 8.5:11  # US Letter portrait
  layer_visualization:
    style: horizontal_bands
    fill: pastel_per_layer
    border: thin_solid
    label_position: left_aligned
  callout_visualization:
    border: red_dashed_2pt
    icon: warning_triangle
    fill: white_with_alpha
    connection_to_layer: leader_line_or_anchor
    text_max_words: 25
    text_style: plain_english_no_jargon
  color_palette:
    critical: "#DC2626"  # Existing tachi convention
    high: "#F97316"      # Existing tachi convention
    layer_fills_pastel: ["#F0F4FF", "#FFF4F0", "#F0FFF4", "#FFF0F8", "#F8F0FF"]  # Cycled deterministically by layer position
  typography:
    title_size: large
    callout_text_size: medium
    layer_label_size: medium_bold
    intent: readable_for_projection_or_print

# Schema version note
schema_version_change: |
  No schema version bump required. The infographic.yaml schema is additive —
  enumerating a new template name does not break any existing template
  consumers. If a strict consumer rejects unknown template names in the
  enumeration, the consumer must be updated; this is unlikely since template
  enumeration is informational metadata, not a structural constraint.
