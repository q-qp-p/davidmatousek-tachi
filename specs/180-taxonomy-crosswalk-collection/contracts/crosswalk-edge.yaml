# Contract: Crosswalk edge shape (crosswalk.yaml)
# Authoritative source: spec.md FR-009 through FR-014 and data-model.md §2
# Audience: authors seeding crosswalk edges; paste-and-adapt this shape.
#
# Per-edge record shape: {source: {taxonomy, id}, target: {taxonomy, id}, edge_type, confidence, citation}
# Enum domains:
#   taxonomy (7 values): owasp, mitre-attack, mitre-atlas, nist-ai-rmf, cwe, tachi-control-category, tachi-stride-ai-category
#   edge_type (3 values): primary, related, superseded  — F-A1 ships primary only (≥500)
#   confidence (3 values): high, medium, low  — with anti-drift rule per README
#
# This contract file is a reference example, not a consumed artifact.

# ─── Example 1: OWASP → CWE primary edge (high confidence, URL citation) ──────
- source:
    taxonomy: owasp
    id: LLM05
  target:
    taxonomy: cwe
    id: CWE-79
  edge_type: primary
  confidence: high
  citation: https://genai.owasp.org/llmrisk/llm05-improper-output-handling/

# ─── Example 2: NIST Surface B edge (tachi-control-category → nist-ai-rmf) ─────
