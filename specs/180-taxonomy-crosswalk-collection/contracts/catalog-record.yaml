# ─── Example 4: CWE record (cwe.yaml — cwe_refs OMITTED per FR-003) ────────────
- id: CWE-89
  full_id: CWE-89
  name: "Improper Neutralization of Special Elements used in an SQL Command ('SQL Injection')"
  url: https://cwe.mitre.org/data/definitions/89.html
# NOTE: NO cwe_refs field on cwe.yaml records. CWE→CWE relations live in crosswalk.yaml.

