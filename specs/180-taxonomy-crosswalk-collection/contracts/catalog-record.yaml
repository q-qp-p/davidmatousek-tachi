# Contract: Catalog record shape (7 catalog YAMLs under schemas/taxonomy/)
# Authoritative source: spec.md FR-003 through FR-008 and data-model.md §1
# Audience: authors seeding a new catalog YAML; paste-and-adapt this shape.
#
# Per-item record shape: {id, full_id, name, url, cwe_refs}
# The `cwe_refs` field is OMITTED entirely from cwe.yaml records (FR-003).
# For other catalogs, `cwe_refs` is optional (may be empty list []).
#
# This contract file is a reference example, not a consumed artifact.

# ─── Example 1: OWASP LLM Top 10:2025 item (owasp.yaml) ────────────────────────
- id: LLM05
  full_id: OWASP-LLM-2025-05
  name: Improper Output Handling
  url: https://genai.owasp.org/llmrisk/llm05-improper-output-handling/
  cwe_refs:
    - CWE-79
    - CWE-89
    - CWE-116

