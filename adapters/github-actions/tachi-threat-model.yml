# tachi-threat-model — GitHub Actions CI workflow
#
# Triggers on PR changes to architecture files, invokes tachi threat agents
# via LLM API, and uploads findings to GitHub Code Scanning.
#
# Prerequisites:
#   - Repository secret: LLM_API_KEY (Anthropic API key or compatible provider)
#   - GitHub Advanced Security enabled (for Code Scanning SARIF upload)
#
# Usage:
#   1. Copy this file to .github/workflows/tachi-threat-model.yml
#   2. Set the LLM_API_KEY repository secret
#   3. Push a PR that modifies architecture files
#
# See adapters/github-actions/README.md for full documentation.

name: tachi-threat-model

on:
  pull_request:
    paths:
      - 'docs/architecture/**'
      - '**/*.mermaid'
      - '**/*.puml'
      - '**/*.drawio'
  workflow_dispatch:
    inputs:
      architecture-path:
        description: 'Path to architecture file(s) to analyze'
        required: false
        default: 'docs/architecture/'
      llm-provider:
        description: 'LLM provider (anthropic)'
        required: false
        default: 'anthropic'
      llm-model:
        description: 'LLM model identifier (must support 200K+ context)'
        required: false
        default: 'claude-sonnet-4-20250514'
      max-tokens:
        description: 'Maximum tokens for LLM response'
        required: false
        default: '16384'

permissions:
  contents: read
  security-events: write
  pull-requests: read

env:
  LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
  LLM_PROVIDER: ${{ inputs.llm-provider || 'anthropic' }}
  LLM_MODEL: ${{ inputs.llm-model || 'claude-sonnet-4-20250514' }}
  MAX_TOKENS: ${{ inputs.max-tokens || '16384' }}

jobs:
  threat-model:
    name: Threat Model Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ------------------------------------------------------------------
      # Step 1: Checkout repository
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------------------
      # Step 2: Detect changed architecture files
      # ------------------------------------------------------------------
      - name: Detect architecture files
        id: detect-files
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual dispatch: use the provided input path
            INPUT_PATH="${{ inputs.architecture-path || 'docs/architecture/' }}"
            echo "mode=dispatch" >> "$GITHUB_OUTPUT"
          else
            # PR trigger: detect changed files matching architecture patterns
            INPUT_PATH=""
            echo "mode=pull_request" >> "$GITHUB_OUTPUT"
          fi

          ARCH_FILES=""

          if [ -n "$INPUT_PATH" ]; then
            # Dispatch mode: collect files from the input path
            if [ -d "$INPUT_PATH" ]; then
              ARCH_FILES=$(find "$INPUT_PATH" -type f \( \
                -name '*.md' -o \
                -name '*.mermaid' -o \
                -name '*.puml' -o \
                -name '*.drawio' \
              \) | sort)
            elif [ -f "$INPUT_PATH" ]; then
              ARCH_FILES="$INPUT_PATH"
            else
              echo "::error::Architecture path not found: $INPUT_PATH"
              exit 1
            fi
          else
            # PR mode: get changed files from the PR diff
            CHANGED=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}" 2>/dev/null || true)

            for f in $CHANGED; do
              case "$f" in
                docs/architecture/*|*.mermaid|*.puml|*.drawio)
                  if [ -f "$f" ]; then
                    ARCH_FILES="${ARCH_FILES:+$ARCH_FILES$'\n'}$f"
                  fi
                  ;;
              esac
            done
          fi

          if [ -z "$ARCH_FILES" ]; then
            echo "::warning::No architecture files found to analyze."
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "files=" >> "$GITHUB_OUTPUT"
          else
            FILE_COUNT=$(echo "$ARCH_FILES" | wc -l | tr -d ' ')
            echo "Found $FILE_COUNT architecture file(s) to analyze."
            echo "$ARCH_FILES"

            # Store file list for subsequent steps (newline-delimited)
            EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
            echo "files<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
            echo "$ARCH_FILES" >> "$GITHUB_OUTPUT"
            echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"

            echo "has_files=true" >> "$GITHUB_OUTPUT"
          fi

      # ------------------------------------------------------------------
      # Step 3: Read architecture input
      # ------------------------------------------------------------------
      - name: Read architecture input
        id: read-input
        if: steps.detect-files.outputs.has_files == 'true'
        shell: bash
        run: |
          set -euo pipefail

          ARCH_INPUT=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if [ -f "$file" ]; then
              ARCH_INPUT="${ARCH_INPUT}--- ${file} ---"$'\n'
              ARCH_INPUT="${ARCH_INPUT}$(cat "$file")"$'\n\n'
            else
              echo "::warning::File not found, skipping: $file"
            fi
          done <<< "${{ steps.detect-files.outputs.files }}"

          if [ -z "$ARCH_INPUT" ]; then
            echo "::error::No architecture content could be read."
            exit 1
          fi

          # Write concatenated input to a temp file (avoids shell escaping issues)
          echo "$ARCH_INPUT" > architecture-input.txt
          INPUT_BYTES=$(wc -c < architecture-input.txt)
          echo "Architecture input prepared ($INPUT_BYTES bytes)."

          # Validate architecture input is non-empty
          if [ "$INPUT_BYTES" -le 1 ]; then
            echo "::error::Architecture input is empty after reading all files."
            exit 1
          fi

          # Warn if input might exceed typical LLM context limits
          # ~4 chars per token; 200K tokens ~ 800K chars; warn at 75% threshold
          INPUT_WARN_THRESHOLD=600000
          if [ "$INPUT_BYTES" -gt "$INPUT_WARN_THRESHOLD" ]; then
            echo "::warning::Architecture input is ${INPUT_BYTES} bytes (~$((INPUT_BYTES / 4)) tokens). This may approach or exceed the model's context window. Consider reducing the input or using a model with a larger context window."
          fi

      # ------------------------------------------------------------------
      # Step 4: Read orchestrator prompt
      # ------------------------------------------------------------------
      - name: Read orchestrator prompt
        id: read-orchestrator
        if: steps.detect-files.outputs.has_files == 'true'
        shell: bash
        run: |
          set -euo pipefail

          ORCHESTRATOR_PATH="agents/orchestrator.md"

          if [ ! -f "$ORCHESTRATOR_PATH" ]; then
            echo "::error::Orchestrator prompt not found at $ORCHESTRATOR_PATH"
            exit 1
          fi

          cp "$ORCHESTRATOR_PATH" orchestrator-prompt.txt

          # Extract version from frontmatter for SARIF tool version
          TOOL_VERSION=$(sed -n 's/^version: *"\{0,1\}\([^"]*\)"\{0,1\}/\1/p' "$ORCHESTRATOR_PATH" | head -1)
          if [ -z "$TOOL_VERSION" ]; then
            TOOL_VERSION="0.0.0"
          fi
          echo "tool_version=$TOOL_VERSION" >> "$GITHUB_OUTPUT"
          echo "Orchestrator prompt loaded (version: $TOOL_VERSION)."

      # ------------------------------------------------------------------
      # Step 5: Invoke LLM API
      # ------------------------------------------------------------------
      - name: Invoke LLM API
        id: invoke-llm
        if: steps.detect-files.outputs.has_files == 'true'
        timeout-minutes: 10
        shell: bash
        run: |
          set -euo pipefail

          # Validate API key is present
          if [ -z "${LLM_API_KEY:-}" ]; then
            echo "::error::LLM_API_KEY secret is not set. Configure it in repository Settings > Secrets and variables > Actions."
            exit 1
          fi

          ORCHESTRATOR_PROMPT=$(cat orchestrator-prompt.txt)
          ARCH_INPUT=$(cat architecture-input.txt)

          # Build the user message with architecture input wrapped in tags
          # per the orchestrator's input sanitization boundary
          USER_MESSAGE="Analyze the following architecture for security threats.

          <architecture-input>
          ${ARCH_INPUT}
          </architecture-input>

          Produce a complete threat analysis following your threat modeling methodology. Output the findings as a structured markdown document suitable for threats.md."

          if [ "$LLM_PROVIDER" = "anthropic" ]; then
            # Anthropic Messages API
            # Build JSON payload using jq for proper escaping
            PAYLOAD=$(jq -n \
              --arg model "$LLM_MODEL" \
              --argjson max_tokens "${MAX_TOKENS}" \
              --arg system "$ORCHESTRATOR_PROMPT" \
              --arg user_msg "$USER_MESSAGE" \
              '{
                model: $model,
                max_tokens: $max_tokens,
                system: $system,
                messages: [
                  {
                    role: "user",
                    content: $user_msg
                  }
                ]
              }')

            echo "Invoking Anthropic API (model: $LLM_MODEL, max_tokens: $MAX_TOKENS)..."

            # Retry logic: attempt up to 2 times with exponential backoff on 429
            MAX_ATTEMPTS=2
            ATTEMPT=1
            HTTP_CODE=""
            RESPONSE_BODY=""

            while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
              HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" \
                --max-time 300 \
                -X POST "https://api.anthropic.com/v1/messages" \
                -H "Content-Type: application/json" \
                -H "x-api-key: ${LLM_API_KEY}" \
                -H "anthropic-version: 2023-06-01" \
                -d "$PAYLOAD" 2>&1) || {
                  # curl itself failed (network error, DNS failure, or timeout)
                  CURL_EXIT=$?
                  if [ "$CURL_EXIT" -eq 28 ]; then
                    echo "::error::LLM API call timed out. This may indicate the architecture input is too large for the model's context window."
                  else
                    echo "::error::curl request to Anthropic API failed (exit code: $CURL_EXIT)."
                  fi
                  exit 1
                }

              # Separate body and status code
              HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -1)
              RESPONSE_BODY=$(echo "$HTTP_RESPONSE" | sed '$d')

              # Handle rate limiting (429) with retry
              if [ "$HTTP_CODE" -eq 429 ]; then
                if [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
                  BACKOFF_SECONDS=$((2 * 30))  # 2^1 * 30 = 60 seconds
                  echo "::warning::Rate limited (HTTP 429). Retrying in ${BACKOFF_SECONDS}s (attempt $((ATTEMPT + 1))/$MAX_ATTEMPTS)..."
                  sleep "$BACKOFF_SECONDS"
                  ATTEMPT=$((ATTEMPT + 1))
                  continue
                else
                  echo "::error::Rate limited (HTTP 429) after $MAX_ATTEMPTS attempts. The LLM API is throttling requests. Wait and re-run the workflow, or check your API plan's rate limits."
                  exit 1
                fi
              fi

              # Not a 429 — break out of retry loop
              break
            done

            # Handle authentication failures (401/403)
            if [ "$HTTP_CODE" -eq 401 ] || [ "$HTTP_CODE" -eq 403 ]; then
              echo "::error::Authentication failed. Verify that the LLM_API_KEY secret is correctly configured in repository settings."
              exit 1
            fi

            # Handle all other non-200 responses
            if [ "$HTTP_CODE" -ne 200 ]; then
              ERROR_MSG=$(echo "$RESPONSE_BODY" | jq -r '.error.message // .error.type // "Unknown error"' 2>/dev/null || echo "HTTP $HTTP_CODE")
              echo "::error::Anthropic API returned HTTP $HTTP_CODE: $ERROR_MSG"
              echo "$RESPONSE_BODY" | jq '.' 2>/dev/null || echo "$RESPONSE_BODY"
              exit 1
            fi

            # Extract text content from Anthropic response
            LLM_OUTPUT=$(echo "$RESPONSE_BODY" | jq -r '.content[] | select(.type == "text") | .text' 2>/dev/null)

            if [ -z "$LLM_OUTPUT" ]; then
              echo "::error::No text content in Anthropic API response."
              echo "$RESPONSE_BODY" | jq '.' 2>/dev/null || echo "$RESPONSE_BODY"
              exit 1
            fi
          else
            echo "::error::Unsupported LLM provider: $LLM_PROVIDER. Currently supported: anthropic"
            exit 1
          fi

          # Write raw LLM output for downstream parsing
          echo "$LLM_OUTPUT" > llm-output.txt
          OUTPUT_BYTES=$(wc -c < llm-output.txt)
          echo "LLM response received ($OUTPUT_BYTES bytes)."

          # Validate LLM response is non-empty (T033: output validation)
          if [ "$OUTPUT_BYTES" -le 1 ]; then
            echo "::error::LLM returned an empty response. The model may have refused the request or encountered an internal error."
            exit 1
          fi

      # ------------------------------------------------------------------
      # Step 6: Parse output and generate threats.md
      # ------------------------------------------------------------------
      - name: Parse output
        id: parse-output
        if: steps.detect-files.outputs.has_files == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f llm-output.txt ]; then
            echo "::error::LLM output file not found."
            exit 1
          fi

          # The LLM output is the threat analysis in markdown format.
          # Use it directly as threats.md.
          cp llm-output.txt threats.md

          # Validate threats.md was generated and is non-empty
          if [ ! -f threats.md ]; then
            echo "::error::threats.md was not generated."
            exit 1
          fi

          THREATS_BYTES=$(wc -c < threats.md)
          if [ "$THREATS_BYTES" -le 1 ]; then
            echo "::error::threats.md is empty."
            exit 1
          fi

          echo "threats.md generated ($(wc -l < threats.md) lines, $THREATS_BYTES bytes)."

      # ------------------------------------------------------------------
      # Step 7: Generate SARIF output
      # ------------------------------------------------------------------
      - name: Generate SARIF
        id: generate-sarif
        if: steps.detect-files.outputs.has_files == 'true'
        shell: bash
        run: |
          set -euo pipefail

          TOOL_VERSION="${{ steps.read-orchestrator.outputs.tool_version }}"
          ARCH_FILE="${{ steps.detect-files.outputs.files }}"
          # Use the first file as the primary artifact location
          PRIMARY_FILE=$(echo "$ARCH_FILE" | head -1)

          # Parse threat findings from the markdown output.
          # Extract structured findings using pattern matching on common
          # tachi output format: headings with threat IDs and severity markers.
          #
          # This parser handles the standard tachi output structure:
          #   ## [ID] Threat Title
          #   **Severity**: Critical|High|Medium|Low
          #   **Component**: <component-name>
          #   <description text>

          RESULTS="[]"
          RULES="[]"
          RULE_IDS_SEEN=""

          CURRENT_ID=""
          CURRENT_TITLE=""
          CURRENT_SEVERITY=""
          CURRENT_COMPONENT=""
          CURRENT_DESCRIPTION=""
          IN_FINDING=false

          # Function: map severity to SARIF level
          severity_to_level() {
            case "$(echo "$1" | tr '[:upper:]' '[:lower:]')" in
              critical|high) echo "error" ;;
              medium)        echo "warning" ;;
              low|info*)     echo "note" ;;
              *)             echo "warning" ;;
            esac
          }

          # Function: map severity to security-severity score
          severity_to_score() {
            case "$(echo "$1" | tr '[:upper:]' '[:lower:]')" in
              critical) echo "9.5" ;;
              high)     echo "8.0" ;;
              medium)   echo "5.5" ;;
              low)      echo "3.0" ;;
              *)        echo "5.5" ;;
            esac
          }

          # Function: emit a finding as a SARIF result
          emit_finding() {
            local id="$1" title="$2" severity="$3" component="$4" description="$5"
            [ -z "$id" ] && return

            local level
            level=$(severity_to_level "$severity")
            local score
            score=$(severity_to_score "$severity")

            # Determine rule ID category from finding ID prefix
            local rule_id="tachi/threat"
            case "$id" in
              S-*)  rule_id="tachi/stride/spoofing" ;;
              T-*)  rule_id="tachi/stride/tampering" ;;
              R-*)  rule_id="tachi/stride/repudiation" ;;
              I-*)  rule_id="tachi/stride/info-disclosure" ;;
              D-*)  rule_id="tachi/stride/denial-of-service" ;;
              E-*)  rule_id="tachi/stride/elevation-of-privilege" ;;
              PI-*) rule_id="tachi/ai/prompt-injection" ;;
              DP-*) rule_id="tachi/ai/data-poisoning" ;;
              MT-*) rule_id="tachi/ai/model-theft" ;;
              AA-*) rule_id="tachi/ai/agent-autonomy" ;;
              TA-*) rule_id="tachi/ai/tool-abuse" ;;
            esac

            # Add rule if not already seen
            if ! echo "$RULE_IDS_SEEN" | grep -qF "$rule_id"; then
              local rule_entry
              rule_entry=$(jq -n \
                --arg rid "$rule_id" \
                --arg title "$title" \
                --arg score "$score" \
                '{
                  id: $rid,
                  shortDescription: { text: $title },
                  properties: {
                    tags: ["security", "threat-model"],
                    "security-severity": $score
                  }
                }')
              RULES=$(echo "$RULES" | jq --argjson entry "$rule_entry" '. + [$entry]')
              RULE_IDS_SEEN="${RULE_IDS_SEEN} ${rule_id}"
            fi

            # Compute deterministic fingerprint: SHA-256 of rule_id:title:component
            # This ensures the same finding on the same component produces the
            # same fingerprint across runs, enabling GitHub Code Scanning to
            # deduplicate identical findings.
            local fingerprint
            fingerprint=$(echo -n "${rule_id}:${title}:${component}" | sha256sum | cut -d' ' -f1)

            # Build the SARIF result entry
            local result_entry
            result_entry=$(jq -n \
              --arg rid "$rule_id" \
              --arg msg "$description" \
              --arg level "$level" \
              --arg file "$PRIMARY_FILE" \
              --arg comp "${component:-unknown}" \
              --arg fid "$id" \
              --arg hash "$fingerprint" \
              '{
                ruleId: $rid,
                message: { text: $msg },
                level: $level,
                locations: [
                  {
                    physicalLocation: {
                      artifactLocation: { uri: $file },
                      region: { startLine: 1 }
                    },
                    logicalLocations: [
                      {
                        name: $comp,
                        kind: "process"
                      }
                    ]
                  }
                ],
                partialFingerprints: {
                  "primaryLocationLineHash": $hash,
                  "findingId/v1": $fid
                }
              }')

            RESULTS=$(echo "$RESULTS" | jq --argjson entry "$result_entry" '. + [$entry]')
          }

          # Parse the threats.md file line by line
          while IFS= read -r line || [ -n "$line" ]; do
            # Detect finding headers: ## S-1: Title or ## [S-1] Title or ### S-1 Title
            if echo "$line" | grep -qE '^#{2,3} +\[?[A-Z]+-[0-9]+'; then
              # Emit previous finding if exists
              if [ "$IN_FINDING" = true ] && [ -n "$CURRENT_ID" ]; then
                emit_finding "$CURRENT_ID" "$CURRENT_TITLE" "${CURRENT_SEVERITY:-Medium}" \
                  "$CURRENT_COMPONENT" "${CURRENT_DESCRIPTION:-$CURRENT_TITLE}"
              fi

              # Parse new finding
              CURRENT_ID=$(echo "$line" | grep -oE '[A-Z]+-[0-9]+' | head -1)
              CURRENT_TITLE=$(echo "$line" | sed -E 's/^#{2,3} +\[?[A-Z]+-[0-9]+\]?:? *//')
              CURRENT_SEVERITY=""
              CURRENT_COMPONENT=""
              CURRENT_DESCRIPTION=""
              IN_FINDING=true
              continue
            fi

            if [ "$IN_FINDING" = true ]; then
              # Extract severity
              if echo "$line" | grep -qiE '^\*?\*?severity\*?\*?:'; then
                CURRENT_SEVERITY=$(echo "$line" | sed -E 's/.*: *\*?\*?([A-Za-z]+).*/\1/')
              fi

              # Extract component
              if echo "$line" | grep -qiE '^\*?\*?(component|target|affected)\*?\*?:'; then
                CURRENT_COMPONENT=$(echo "$line" | sed -E 's/.*: *\*?\*?(.*)\*?\*?$/\1/' | sed 's/\*//g')
              fi

              # Accumulate description (first non-metadata paragraph)
              if [ -z "$CURRENT_DESCRIPTION" ] && [ -n "$line" ] && \
                 ! echo "$line" | grep -qE '^\*?\*?(Severity|Component|Target|Affected|Risk|Category|Mitigation|STRIDE)\*?\*?:'; then
                CURRENT_DESCRIPTION="$line"
              fi
            fi
          done < threats.md

          # Emit last finding
          if [ "$IN_FINDING" = true ] && [ -n "$CURRENT_ID" ]; then
            emit_finding "$CURRENT_ID" "$CURRENT_TITLE" "${CURRENT_SEVERITY:-Medium}" \
              "$CURRENT_COMPONENT" "${CURRENT_DESCRIPTION:-$CURRENT_TITLE}"
          fi

          # Count results for reporting
          RESULT_COUNT=$(echo "$RESULTS" | jq 'length')

          # If no structured findings were parsed, create a single informational result
          # so that the SARIF file is still valid and uploadable.
          if [ "$RESULT_COUNT" -eq 0 ]; then
            echo "::warning::No structured threat findings parsed from LLM output. Creating informational SARIF entry."
            RULES=$(jq -n '[{
              id: "tachi/threat-model",
              shortDescription: { text: "Tachi threat model analysis" },
              properties: { tags: ["security", "threat-model"], "security-severity": "5.5" }
            }]')
            INFO_FINGERPRINT=$(echo -n "tachi/threat-model:informational:${PRIMARY_FILE}" | sha256sum | cut -d' ' -f1)
            RESULTS=$(jq -n --arg file "$PRIMARY_FILE" --arg hash "$INFO_FINGERPRINT" '[{
              ruleId: "tachi/threat-model",
              message: { text: "Threat analysis completed. Review threats.md artifact for full findings." },
              level: "note",
              locations: [{
                physicalLocation: {
                  artifactLocation: { uri: $file },
                  region: { startLine: 1 }
                }
              }],
              partialFingerprints: {
                "primaryLocationLineHash": $hash
              }
            }]')
            RESULT_COUNT=1
          fi

          # Assemble the complete SARIF document
          jq -n \
            --arg version "$TOOL_VERSION" \
            --argjson rules "$RULES" \
            --argjson results "$RESULTS" \
            '{
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json",
              version: "2.1.0",
              runs: [
                {
                  tool: {
                    driver: {
                      name: "tachi-threat-model",
                      semanticVersion: $version,
                      informationUri: "https://github.com/tachi-security/tachi",
                      rules: $rules
                    }
                  },
                  results: $results
                }
              ]
            }' > threats.sarif

          echo "threats.sarif generated with $RESULT_COUNT finding(s)."

          # Validate threats.sarif exists, is non-empty, and is valid JSON
          if [ ! -f threats.sarif ]; then
            echo "::error::threats.sarif was not generated."
            exit 1
          fi

          if [ "$(wc -c < threats.sarif)" -le 1 ]; then
            echo "::error::threats.sarif is empty."
            exit 1
          fi

          if ! jq empty threats.sarif 2>/dev/null; then
            echo "::error::Generated SARIF file is not valid JSON."
            exit 1
          fi

          # Validate SARIF has expected structure
          SARIF_RESULTS=$(jq -r '.runs[0].results | length' threats.sarif 2>/dev/null || echo "0")
          if [ "$SARIF_RESULTS" -eq 0 ]; then
            echo "::warning::SARIF file contains no results in runs[0].results."
          fi

          echo "SARIF validation passed ($SARIF_RESULTS result(s))."

      # ------------------------------------------------------------------
      # Step 8: Upload SARIF to Code Scanning
      # ------------------------------------------------------------------
      - name: Upload SARIF to Code Scanning
        if: steps.detect-files.outputs.has_files == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: threats.sarif
          category: tachi-threat-model

      # ------------------------------------------------------------------
      # Step 9: Upload artifacts
      # ------------------------------------------------------------------
      - name: Upload threat model artifacts
        if: steps.detect-files.outputs.has_files == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tachi-threat-model
          path: |
            threats.md
            threats.sarif

      # ------------------------------------------------------------------
      # Summary
      # ------------------------------------------------------------------
      - name: Job summary
        if: steps.detect-files.outputs.has_files == 'true'
        shell: bash
        run: |
          RESULT_COUNT=$(jq '.runs[0].results | length' threats.sarif 2>/dev/null || echo "0")
          {
            echo "## Tachi Threat Model Results"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Findings | $RESULT_COUNT |"
            echo "| Model | $LLM_MODEL |"
            echo "| SARIF | Uploaded to Code Scanning |"
            echo "| Artifacts | threats.md, threats.sarif |"
            echo ""
            echo "View full results in the **Security** tab or download the **tachi-threat-model** artifact."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: No architecture files
        if: steps.detect-files.outputs.has_files != 'true'
        shell: bash
        run: |
          echo "::notice::No architecture files detected in this change. Skipping threat analysis."
          {
            echo "## Tachi Threat Model"
            echo ""
            echo "No architecture files were modified in this change. Threat analysis was skipped."
          } >> "$GITHUB_STEP_SUMMARY"
