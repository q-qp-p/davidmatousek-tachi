# Security Report Page Assembly Schema
#
# Defines the page assembly rules for the security assessment PDF
# booklet: artifact detection matrix, page sequence with layout and
# dimensions, and data source tiers for the findings-detail page.
# Drives conditional page inclusion based on available pipeline
# artifacts.
#
# Producers: report-assembler agent (agents/tachi/report-assembler.md)
# Consumers: security-report command (commands/tachi.security-report.md),
#            Typst master orchestrator (templates/tachi/security-report/main.typ)
#
# Version: 1.1

schema_version: "1.1"

security_report:
  output_file: security-report.pdf

  # Artifact Detection Matrix
  #
  # Each entry maps a pipeline output file to the PDF pages it
  # enables. Only threats.md is required — all other artifacts
  # enrich the report when present.
  artifacts:
    - pattern: threats.md
      required: true
      enables: [cover, executive-summary, findings-detail]

    - pattern: threat-report.md
      required: false
      enables: [executive-summary-enriched, remediation-roadmap-enriched]

    - pattern: risk-scores.md
      required: false
      enables: [findings-detail-scored]

    - pattern: compensating-controls.md
      required: false
      enables: [control-coverage, remediation-roadmap, findings-detail-residual]

    - pattern: threat-risk-funnel.jpg
      required: false
      enables: [risk-funnel]

    - pattern: threat-baseball-card.jpg
      required: false
      enables: [baseball-card]

    - pattern: threat-system-architecture.jpg
      required: false
      enables: [system-architecture]

    - pattern: "brand/final/tachi-logo-*.png"
      required: false
      enables: [cover-branded, headers-branded]

  # Page Sequence
  #
  # Defines the fixed ordering, layout orientation, and page size
  # for each page type. Pages are conditionally included based on
  # artifact availability but always appear in this order when
  # present.
  page_sequence:
    - type: cover
      layout: portrait
      size: us-letter

    - type: disclaimer
      layout: portrait
      size: us-letter
      conditional: show-disclaimer

    - type: toc
      layout: portrait
      size: us-letter

    - type: methodology
      layout: portrait
      size: us-letter
      conditional: show-methodology

    - type: scope
      layout: portrait
      size: us-letter

    - type: executive-summary
      layout: portrait
      size: us-letter

    - type: risk-funnel
      layout: landscape
      size: custom-16x9

    - type: baseball-card
      layout: landscape
      size: custom-16x9

    - type: system-architecture
      layout: landscape
      size: custom-16x9

    - type: findings-detail
      layout: portrait
      size: us-letter
      data_source_tiers:
        tier1:
          source: compensating-controls.md
          columns: [ID, Component, Threat, Residual Score, Residual Severity, Control Status, Recommendation]
        tier2:
          source: risk-scores.md
          columns: [ID, Component, Threat, Composite Score, Severity, CVSS, Exploitability]
        tier3:
          source: threats.md
          columns: [ID, Component, Threat, Likelihood, Impact, Risk Level, Mitigation]

    - type: control-coverage
      layout: portrait
      size: us-letter

    - type: remediation-roadmap
      layout: portrait
      size: us-letter

  # Page Dimensions
  #
  # Physical dimensions and margins for each page size. US Letter
  # pages use standard document margins. Custom 16:9 pages use
  # zero margins for full-bleed infographic rendering.
  page_dimensions:
    us-letter:
      width: "8.5in"
      height: "11in"
      margins: { top: "0.75in", bottom: "0.75in", left: "1in", right: "1in" }
    custom-16x9:
      width: "11in"
      height: "6.1875in"
      margins: { top: "0in", bottom: "0in", left: "0in", right: "0in" }

  # Theme Tokens
  #
  # Brand color contract defined in templates/tachi/security-report/theme.typ.
  # Page templates consume these via shared.typ aliases.
  theme_tokens:
    colors:
      brand-primary: "#1B2A4A"    # Tachi Indigo
      brand-secondary: "#2D4A6F"  # Steel Blue
      brand-accent: "#C93A40"     # Vermillion
      brand-highlight: "#B8963E"  # Muted Gold
      brand-dark: "#0D0D0D"       # Lacquer Black
      brand-light: "#F5F2EB"      # Washi White
      brand-muted: "#64748B"      # Ash Gray
    logos:
      primary: "brand/final/tachi-logo-primary.png"
      horizontal: "brand/final/tachi-logo-horizontal.png"
    fonts:
      heading: ["Helvetica Neue", "Helvetica", "Arial", "New Computer Modern"]
      body: ["New Computer Modern", "Charter", "Georgia", "Times New Roman"]
      mono: ["Menlo", "Courier New", "Courier"]

  # Scope Data Contract
  #
  # Variables extracted from threats.md Sections 1-2 for the
  # Assessment Scope page.
  scope_data:
    components: { fields: [name, type, description] }
    data_flows: { fields: [source, destination, data, protocol] }
    trust_boundaries: { fields: [zone, trust-level, components] }
    boundary_crossings: { fields: [crossing, from-zone, to-zone, components, controls] }

  # Configuration
  #
  # Optional report-config.typ overrides.
  config:
    show-disclaimer: { type: boolean, default: true }
    show-methodology: { type: boolean, default: true }
    custom-disclaimer-text: { type: string, default: null }
    custom-footer-text: { type: string, default: null }
