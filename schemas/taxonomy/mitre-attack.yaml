# MITRE ATT&CK Catalog (taxonomy: mitre-attack)
#
# Composition per FR-003 / A1 seed list (38 unique techniques + sub-techniques
# extracted from the 11 threat-detection agents' detection-patterns.md files,
# frozen at spec time 2026-04-17):
#
#   T1005, T1039, T1068, T1070 (+ .001/.002/.004/.006/.008), T1078 (+ .004),
#   T1195 (+ .001/.002), T1213 (+ .001/.002/.003/.005),
#   T1498 (+ .001/.002), T1499 (+ .001/.002/.003/.004),
#   T1530, T1548 (+ .001/.003/.005), T1550 (+ .001),
#   T1556, T1562 (+ .006), T1565
#
# Record shape per FR-003: {id, full_id, name, url, cwe_refs}.
# `cwe_refs: []` for all records — MITRE ATT&CK does not publish direct CWE
# cross-references as part of technique definitions. ATT&CK->CWE relationships
# (where meaningful) live in crosswalk.yaml as edges with curator citations.
#
# URL pattern per FR-033: https://attack.mitre.org/techniques/T<N>/ for parent
# techniques; https://attack.mitre.org/techniques/T<N>/<sub>/ for sub-techniques.
#
# Sorted alphabetically by `id` per FR-032.

