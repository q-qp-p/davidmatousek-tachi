# MITRE ATT&CK Catalog (taxonomy: mitre-attack)
#
# Source-discipline (FR-024 primary-source-correction): records sourced verbatim
# from MITRE's canonical ATT&CK Enterprise STIX 2.1 bundle
# (https://raw.githubusercontent.com/mitre/cti/master/enterprise-attack/enterprise-attack.json).
# Inventory expanded from 38 -> N records at T041 (Wave 4.2, Feature 241).
#
# Pre-existing 38 records (composition per FR-003 / A1 seed list, frozen at
# spec time 2026-04-17) are preserved byte-identical on the {id, full_id, name,
# url, cwe_refs} core fields per F-A2 referential-integrity contract.
#
# Record shape (extended at T043 / ADR-037 D-7): {id, full_id, name, url,
# cwe_refs, out_of_scope, out_of_scope_rationale}.
# `cwe_refs: []` for all records — MITRE ATT&CK does not publish direct CWE
# cross-references as part of technique definitions. ATT&CK->CWE relationships
# (where meaningful) live in crosswalk.yaml as edges with curator citations.
#
# Out-of-Scope determination (ADR-037 D-5 tactical-grouping; verbatim T040 §2
# rationale strings applied uniformly to all member items of the seven OOS
# tactics: TA0005 / TA0007 / TA0008 / TA0009 / TA0010 / TA0011 / TA0040).
# Six in-scope tactics carry `out_of_scope: false`: TA0001 / TA0002 / TA0003 /
# TA0004 / TA0006 / TA0042. Per-item OOS within in-scope tactics applied
# narrowly per T042 (T1078.004 Cloud Accounts only; data-model.md §2 line 110).
#
# URL pattern per FR-033: https://attack.mitre.org/techniques/T<N>/ for parent
# techniques; https://attack.mitre.org/techniques/T<N>/<sub>/ for sub-techniques.
#
# Sorted alphabetically by `id` per FR-032.

