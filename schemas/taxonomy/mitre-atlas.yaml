# MITRE ATLAS Catalog (taxonomy: mitre-atlas)
#
# Composition per FR-003 / A1 seed + external curation (12 records total):
#   - 7 seed IDs (from 11 threat-detection agents' detection-patterns.md):
#     AML.T0010, AML.T0018, AML.T0020, AML.T0024, AML.T0051, AML.T0054, AML.T0057
#   - 5 curated October 2025 agent techniques (FR-016):
#     AML.T0058, AML.T0059, AML.T0060, AML.T0061, AML.T0062
#
# Record shape per FR-003: {id, full_id, name, url, cwe_refs}.
# `cwe_refs: []` for all records — MITRE ATLAS does not publish direct CWE
# cross-references. ATLAS->CWE relationships live in crosswalk.yaml.
#
# URL pattern per FR-033: https://atlas.mitre.org/techniques/<id>
# (canonical URL pattern per MISP-galaxy mitre-atlas-attack-pattern reference,
# no trailing slash convention — matches contract-example 3 in
# specs/180-taxonomy-crosswalk-collection/contracts/catalog-record.yaml).
#
# R7 TRIPWIRE RESOLVED (T020, 2026-04-17): atlas.mitre.org individual technique
# pages return HTTP 404 via WebFetch — confirmed as client-side anti-bot gating
# (the matrix index https://atlas.mitre.org/matrices/ATLAS and even the well-
# known seed AML.T0051 "LLM Prompt Injection" page also 404 via the same client,
# while https://atlas.mitre.org/ homepage does load). This is a WebFetch-client
# limitation, NOT a URL stability issue. URL pattern verified stable via the
# authoritative MITRE-owned atlas-data repo at
# https://raw.githubusercontent.com/mitre-atlas/atlas-data/main/data/techniques.yaml
# (primary source) cross-referenced against MISP galaxy (secondary source).
#
# NAME CORRECTION APPLIED (T020, 2026-04-17): canonical names for AML.T0058-
# T0062 re-verified against the authoritative atlas-data techniques.yaml and
# CORRECTED — T011's aggregated-search names were contaminated (speculative
# agent-themed labels not matching the actual ATLAS publication). Latest
# ATLAS release is v5.5.0 (March 2025); there is no "October 2025 v5.4"
# release — T011's attribution was also incorrect.
#
# F-241 EXPANSION APPLIED (T038, 2026-05-01): record count 12 -> 30 via
# external curation against the authoritative atlas-data techniques.yaml
# (https://raw.githubusercontent.com/mitre-atlas/atlas-data/main/data/techniques.yaml).
# The 18 net-new records cover all 11 ATLAS taxonomy phases per FR-010 of
# specs/241-web-api-coverage-attestation/spec.md: Reconnaissance (T0000,
# T0003, T0004), Resource Development (T0002, T0016, T0019), Initial Access
# (T0012), ML Model Access (T0040), ML Attack Staging (T0042), Execution
# (T0011), Discovery (T0007, T0013, T0014), Defense Evasion (T0015),
# Collection (T0035), Impact (T0029, T0031, T0034). The 3 prose-only
# techniques cited at F-6 ADR-035 D-7 (AML.T0015, AML.T0019, AML.T0031) are
# now catalog-resolvable, closing the F-6 catalog-gap-propagation rule.
# The 7 pre-existing seed names + 5 corrected T0058-T0062 names are held
# byte-identical at expansion time (no name updates re-applied even where
# the upstream atlas-data repo has subsequently re-titled techniques —
# e.g., AML.T0010 "ML Supply Chain Compromise" -> "AI Supply Chain
# Compromise" in v5.5; AML.T0024 "Exfiltration via ML Inference API" ->
# "Exfiltration via AI Inference API" in v5.5). Name re-verification under
# the current ATLAS revision is filed as a separate follow-on Issue.
#
# F-241 RECORD-SHAPE EXTENSION APPLIED (T039, 2026-05-01): every record now
# carries two new optional fields per ADR-037 D-7 (extending ADR-027 D1
# record-shape): `out_of_scope: bool` (default false) and
# `out_of_scope_rationale: string` (default empty). Existing F-A1 records
# that omit these fields parse correctly under YAML defaults
# (backward-compat preserved per FR-012). F-241 ruling: ALL 30 ATLAS
# records remain IN-SCOPE (`out_of_scope: false`) — the canonical ATLAS
# techniques in this catalog all have at least one design-time mitigation
# surface (e.g., AML.T0034 Cost Harvesting -> design-time rate-limit and
# budget controls; AML.T0036/T0037 Discovery -> output sanitization and
# query throttling; AML.T0048 External Harms -> output safeguards). Per
# FR-013, coverage % = |cited_ids| / |taxonomy_ids_not_out_of_scope|;
# denominator at F-241 closure = 30 with zero exclusions.
#
# Sorted alphabetically by `id` per FR-032.

