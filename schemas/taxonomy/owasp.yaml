# OWASP Catalog (taxonomy: owasp)
#
# Composition per FR-020 (6 OWASP lists, ≥60 items total):
#   - Top 10:2021 (10 items: A01-A10)
#   - API Security Top 10:2023 (10 items: API1-API10)
#   - Top 10 for Agentic Applications:2026 (10 items: ASI01-ASI10)
#   - LLM Top 10:2025 (10 items: LLM01-LLM10)
#   - Mobile Top 10:2024 (10 items: M1-M10)
#   - ML Security Top 10:2023 (10 items: ML01-ML10)
#
# Record shape per FR-003: {id, full_id, name, url, cwe_refs}.
# `cwe_refs` populated ONLY where the OWASP source explicitly publishes CWE
# cross-references (FR-008 unidirectional OWASP->CWE rule). `cwe_refs: []` where
# OWASP does not publish them (LLM, ASI, ML, Mobile, API lists at spec time).
#
# Top 10:2021 CWE mappings sourced from per-category OWASP pages (the
# "List of Mapped CWEs" section). A01/A02/A03 lists include the top 10 most
# commonly-cited CWEs from the full published list; full CWE coverage lives
# in crosswalk.yaml (where A-category<->CWE edges carry 'citation: URL').
#
# Sorted alphabetically by `id` per FR-032.

