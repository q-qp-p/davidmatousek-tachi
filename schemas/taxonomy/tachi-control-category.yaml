# tachi Control Category Catalog (taxonomy: tachi-control-category)
#
# Composition per FR-018 (exactly 8 records, fixed-count pseudo-taxonomy):
#   access-control, authentication, csp-security-headers, csrf-protection,
#   encryption, input-validation, logging-audit, rate-limiting
#
# Record shape per FR-003: {id, full_id, name, url, cwe_refs}.
# `cwe_refs: []` for all records — tachi pseudo-taxonomies do not publish
# direct CWE cross-references. tachi-control-category->CWE relationships
# live in crosswalk.yaml where curator-authored.
#
# `url` points to the canonical reference file at repo-relative path per
# FR-007 (URL-shaped OR existing repo file path). All 8 records share the
# same reference file — the control-categories.md doc is the single source
# of truth for the 8 categories, their STRIDE-to-control mapping, and
# detection patterns.
#
# Source: `.claude/skills/tachi-control-analysis/references/control-categories.md`
# (8 categories verified at spec time 2026-04-17).
#
# `name` is title-case human form derived from the kebab-case `id`
# (e.g., `logging-audit` -> `Logging/Audit` matches reference heading).
#
# Sorted alphabetically by `id` per FR-032.

