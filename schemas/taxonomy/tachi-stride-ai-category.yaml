# tachi STRIDE+AI Category Catalog (taxonomy: tachi-stride-ai-category)
#
# Composition per FR-019 (exactly 11 records, fixed-count pseudo-taxonomy):
#   - 6 STRIDE: spoofing, tampering, repudiation, info-disclosure,
#     denial-of-service, privilege-escalation
#   - 5 AI: prompt-injection, data-poisoning, model-theft, agent-autonomy,
#     tool-abuse
#
# Record shape per FR-003: {id, full_id, name, url, cwe_refs}.
# `cwe_refs: []` for all records — tachi pseudo-taxonomies do not publish
# direct CWE cross-references. tachi-stride-ai-category->CWE relationships
# live in crosswalk.yaml where curator-authored.
#
# `url` points to the canonical reference file at repo-relative path per
# FR-007 (URL-shaped OR existing repo file path). All 11 records share the
# same reference file — stride-categories-shared.md is the single source of
# truth for category definitions and STRIDE+AI canonical spellings.
#
# Source: `.claude/skills/tachi-shared/references/stride-categories-shared.md`
# (11 categories verified at spec time 2026-04-17). The canonical `id` values
# match the "Internal Name" column of the reference's STRIDE and AI tables
# (spoofing/tampering/repudiation/info-disclosure/denial-of-service/
# privilege-escalation and prompt-injection/data-poisoning/model-theft/
# agent-autonomy/tool-abuse). FR-011 referential integrity requires edges
# in crosswalk.yaml to reference these exact `id` strings.
#
# `name` is human-readable title-case form from the "Category" column
# (e.g., `info-disclosure` -> `Information Disclosure`).
#
# Sorted alphabetically by `id` per FR-032.

