# Attack Chain Schema
#
# Represents a cross-layer attack progression spanning multiple
# MAESTRO layers. Chains are sequences of related findings that
# cascade across layers via component lineage, data flow
# dependencies, or structural adjacency.
#
# Producers: orchestrator (Phase 3.5 cross-layer correlation)
# Consumers: threat-report agent (Section 6), extract-report-data.py, tachi_parsers.py
#
# Version: 1.0

schema_version: "1.0"

chain:
  chain_id:
    type: string
    pattern: "^CHAIN-\\d{3}$"
    description: >
      Unique chain identifier. Assigned sequentially in
      deterministic ranking order (severity desc, length desc,
      chain ID alpha asc).
    examples:
      - "CHAIN-001"
      - "CHAIN-002"

  title:
    type: string
    description: >
      Human-readable chain title describing the attack
      progression (e.g., "Data Poisoning to Agent Hijack
      via Corrupted Context").

  layers:
    type: array
    items: string
    enum_values:
      - "L1"
      - "L2"
      - "L3"
      - "L4"
      - "L5"
      - "L6"
      - "L7"
    min_items: 2
    max_items: 7
    description: >
      Ordered MAESTRO layer progression. Each layer appears
      at most once. Minimum 2 layers required for a valid chain.
    examples:
      - ["L2", "L3", "L7"]
      - ["L1", "L2", "L3"]

  max_severity:
    type: string
    enum:
      - Critical
      - High
      - Medium
      - Low
    description: >
      Highest severity among member findings. Chains are
      surfaced only when max_severity is Critical or High.

  findings:
    type: array
    items: chain_member_finding
    min_items: 2
    max_items: 7
    description: >
      Ordered list of member findings with roles and causal
      relationships. One finding per MAESTRO layer in the chain.

  narrative:
    type: string
    min_length: 150
    max_length: 2000
    description: >
      Full chain narrative covering initial exploit, intermediate
      cascades with causal transitions, and business impact.
      Target length: 150-300 words.

  chain_breaking_controls:
    type: array
    items: chain_breaking_control
    min_items: 1
    description: >
      Heuristic recommendations for disrupting the chain.
      Identified by structural centrality analysis.

  surfaced:
    type: boolean
    description: >
      Whether this chain meets the Critical/High threshold
      for inclusion in the threat report and PDF. True when
      max_severity is Critical or High.

chain_member_finding:
  finding_id:
    type: string
    pattern: "^(S|T|R|I|D|E|AG|LLM)-\\d+$"
    description: >
      Reference to a finding ID from threats.md. Must exist
      in the current threat model output.

  maestro_layer:
    type: string
    enum:
      - "L1"
      - "L2"
      - "L3"
      - "L4"
      - "L5"
      - "L6"
      - "L7"
    description: >
      MAESTRO layer assignment of this finding's target component.
      Uses short-form layer codes (L1-L7). The orchestrator normalizes
      from long-form values in finding.yaml (e.g., "L3 — Agent Framework"
      becomes "L3") during Phase 3.5 chain assembly.

  role_in_chain:
    type: string
    enum:
      - initial_exploit
      - intermediate_cascade
      - terminal_impact
    description: >
      The finding's role in the chain progression. Exactly one
      initial_exploit (first), zero or more intermediate_cascade
      (middle), exactly one terminal_impact (last).

  component:
    type: string
    description: >
      Target component name from the architecture description.

  stride_category:
    type: string
    enum:
      - spoofing
      - tampering
      - repudiation
      - info-disclosure
      - denial-of-service
      - privilege-escalation
      - agentic
      - llm
    description: >
      STRIDE or AI category of the finding.

  severity:
    type: string
    enum:
      - Critical
      - High
      - Medium
      - Low
      - Note
    description: >
      Individual finding severity via the risk matrix in severity-bands-shared.md.

  causal_relationship:
    type: string
    nullable: true
    description: >
      How this finding enables the next finding in the chain.
      Uses canonical CSA vocabulary: "enables," "triggers,"
      "shifts," "manifests as." Null for terminal findings.

chain_breaking_control:
  target_finding_id:
    type: string
    pattern: "^(S|T|R|I|D|E|AG|LLM)-\\d+$"
    description: >
      The finding whose remediation would break the chain.

  target_layer:
    type: string
    enum:
      - "L1"
      - "L2"
      - "L3"
      - "L4"
      - "L5"
      - "L6"
      - "L7"
    description: >
      MAESTRO layer of the target finding.

  structural_rationale:
    type: string
    description: >
      Why this finding is the chain-breaking point. Explains
      structural centrality (betweenness for 3+ links, middle
      position for 2-link chains).

  control_recommendation:
    type: string
    description: >
      Specific control action to implement for disrupting
      the chain at this point.

  is_heuristic:
    type: boolean
    default: true
    description: >
      Always true. Disclaimer that chain-breaking controls are
      structurally derived from graph centrality analysis, not
      verified for control effectiveness.

# Correlation Signal (internal, not persisted in artifact)
#
# Evidence connecting two adjacent findings in a chain.
# Used during Phase 3.5 correlation but not included in
# the output artifact.

correlation_signal:
  source_finding_id:
    type: string
    description: >
      Finding ID of the upstream finding.

  target_finding_id:
    type: string
    description: >
      Finding ID of the downstream finding.

  signal_type:
    type: string
    enum:
      - component_lineage
      - data_flow_dependency
      - layer_adjacency_structural
    description: >
      Type of evidence supporting the correlation.
      component_lineage: Components connected by data flows.
      data_flow_dependency: Components sharing data flow paths.
      layer_adjacency_structural: Adjacent MAESTRO layers with
      structural relationship (lookup table match required).

  evidence:
    type: string
    description: >
      Specific evidence supporting the correlation (e.g.,
      "Component A sends data to Component B via Data Flow DF-3").

# Validation Rules
#
# 1. Chain minimum length: len(layers) >= 2
# 2. Chain maximum length: len(layers) <= 7
# 3. Layer uniqueness: Each MAESTRO layer appears at most once per chain
# 4. Finding existence: All finding_id references must exist in threats.md
# 5. Layer consistency: Member finding maestro_layer matches chain layers array
# 6. Role ordering: Exactly one initial_exploit (first), zero+ intermediate_cascade, exactly one terminal_impact (last)
# 7. Surfacing threshold: surfaced = true only when max_severity in [Critical, High]
# 8. Correlation signal required: Adjacent findings must have component_lineage or data_flow_dependency signal
# 9. Determinism: Chain IDs assigned sequentially in ranking order
# 10. Many-to-many: A finding may belong to multiple chains
