# Finding Intermediate Representation (IR) Schema
#
# The atomic unit of threat analysis output. Every threat agent
# (6 STRIDE + 5 AI) produces findings conforming to this schema.
# Every output template and export format consumes findings from
# this schema.
#
# Producers: agents/stride/*.md, agents/ai/*.md
# Consumers: templates/threats.md, SARIF export (F-006), narrative report (F-007)
#
# Version: 1.0

schema_version: "1.5"

finding:
  id:
    type: string
    pattern: "^(S|T|R|I|D|E|AG|LLM|AGP)-\\d+$"
    description: >
      Unique finding identifier within a threat model.
      Prefix indicates category, suffix is a sequential number.
    examples:
      - "S-1"
      - "T-3"
      - "AG-2"
      - "LLM-1"
      - "AGP-1"

  category:
    type: string
    enum:
      - spoofing
      - tampering
      - repudiation
      - info-disclosure
      - denial-of-service
      - privilege-escalation
      - agentic
      - llm
    description: >
      Threat category. Maps 1:1 to the agent type that produced
      this finding.

  component:
    type: string
    description: >
      Target component name from the architecture input.
    examples:
      - "API Gateway"
      - "User Database"
      - "LLM Agent"

  threat:
    type: string
    description: >
      Description of the identified threat.
    examples:
      - "Attacker could spoof authentication tokens to impersonate legitimate users"

  likelihood:
    type: string
    enum:
      - LOW
      - MEDIUM
      - HIGH
    description: >
      Assessed probability of exploitation using OWASP likelihood
      factors (skill level, motive, opportunity, size, ease of
      discovery, ease of exploit, awareness, intrusion detection).

  impact:
    type: string
    enum:
      - LOW
      - MEDIUM
      - HIGH
    description: >
      Assessed severity of exploitation using OWASP impact factors
      (loss of confidentiality, integrity, availability, accountability,
      financial damage, reputation damage, non-compliance, privacy violation).

  risk_level:
    type: string
    enum:
      - Critical
      - High
      - Medium
      - Low
      - Note
    description: >
      Computed from the OWASP 3x3 risk matrix (likelihood x impact).
      See risk_matrix below for the mapping.

  mitigation:
    type: string
    description: >
      Recommended countermeasure for the identified threat.
    examples:
      - "Implement JWT token validation with RS256 signing"

  references:
    type: list[string]
    description: >
      OWASP IDs, CVE IDs, or framework citations supporting
      the finding. Required for AI categories (agentic, llm).
    examples:
      - "OWASP LLM01:2025"
      - "ASI-01"
      - "MCP-03"
      - "CWE-287"

  dfd_element_type:
    type: string
    enum:
      - External Entity
      - Process
      - Data Store
      - Data Flow
    description: >
      DFD classification of the target component.

  # MAESTRO Layer Classification (v1.2)

  maestro_layer:
    type: string
    # Updated in Feature 136 to align with canonical CSA MAESTRO taxonomy (Ken Huang, CSA).
    # Schema version bumped from 1.2 to 1.3 to signal the breaking enum-value change.
    # See CHANGELOG.md for migration notes and ADR-020 for the schema versioning rule.
    enum:
      - "L1 — Foundation Model"
      - "L2 — Data Operations"
      - "L3 — Agent Framework"
      - "L4 — Deployment Infrastructure"
      - "L5 — Evaluation and Observability"
      - "L6 — Security and Compliance"
      - "L7 — Agent Ecosystem"
      - "Unclassified"
    default: "Unclassified"
    description: >
      CSA MAESTRO architectural layer classification for the
      finding's target component. Assigned during Phase 1 based
      on keyword matching against component name, description,
      and DFD type. Propagated passively through all downstream
      phases. Optional — defaults to "Unclassified" when not
      present or when the component matches no layer keywords.

  # Agentic Pattern Classification (v1.4 — Feature 142)

  agentic_pattern:
    type: string
    # Added in Feature 142 to surface the six canonical CSA MAESTRO agentic patterns
    # as named, filterable finding categories. Schema version bumped from 1.3 to 1.4.
    # Additive field with default "none" (minor bump per ADR-026 extension of the
    # Feature 136 enum-value minor-bump rule to cover NEW enum-typed field additions).
    # See ADR-026 for the classification mechanism (Option C: Hybrid Post-Hoc Synthesis)
    # and ADR-020 Revision History for the MAESTRO Phase 3 completion entry.
    enum:
      - agent_collusion
      - emergent_behavior
      - temporal_attack
      - trust_exploitation
      - communication_vulnerability
      - resource_competition
      - none
      - multiple
    default: none
    description: >
      Canonical CSA MAESTRO agentic threat pattern category. Assigned during
      Phase 3.6 (Pattern Synthesis Engine) in the orchestrator pipeline using
      a deterministic rule-based classification engine (per ADR-021). The
      multi-agent gate predicate (FR-006) ensures single-agent architectures
      receive "none" for every finding. Use "none" for findings that do not
      map to any pattern (sentinel; required since field is mandatory
      post-Feature-142). Use "multiple" for findings that exemplify two or
      more patterns equally with tied classification-rule priority (rare;
      analysts should prefer the dominant pattern when one exists). Net-new
      findings generated by Phase 3.6 for previously-uncovered patterns use
      the AGP- id prefix.

  # Baseline-Aware Fields (v1.1)

  delta_status:
    type: string
    enum:
      - NEW
      - UNCHANGED
      - UPDATED
      - RESOLVED
    required_when: baseline_present
    default: NEW
    description: >
      Lifecycle status relative to the baseline run.
      NEW: first appearance (no baseline match).
      UNCHANGED: identical to baseline (same component, threat, assessment).
      UPDATED: same finding with changed description or context.
      RESOLVED: baseline finding no longer applicable in current architecture.
      Defaults to NEW when no baseline is provided.

  baseline_run_id:
    type: string
    nullable: true
    description: >
      Run ID of the baseline that first discovered this finding.
      Null for first-run findings or when no baseline is provided.
      Format matches the run_id in baseline frontmatter (e.g., "2026-03-25T12-53-57").
    examples:
      - "2026-03-25T12-53-57"
      - null

  # Source Attribution (v1.5 — Feature 189)

  source_attribution:
    type: list[record]
    # Added in Feature 189 (F-A2) as an optional list-of-RECORD field carrying
    # machine-readable citations to external compliance-framework items that the
    # finding addresses. Schema version bumped from 1.4 to 1.5 as a minor bump
    # per ADR-026 Complex-Shape Addition Clarifier extension (additive +
    # default-absent + schema shape unchanged). See ADR-028 for the full
    # decision record including the Q1 serialization-surface choice
    # (conditional ## 9. Source Attribution YAML block in threats.md, gated
    # like Feature 141 has-attack-chains), the Q2 referential-integrity phase
    # choice (two-tier: parser-tier enum inline; referential integrity in a
    # separate post-parse helper invoked by orchestrator Phase 4), and the
    # 5-value taxonomy enum scope (external frameworks only; internal tachi
    # taxonomies deliberately excluded per ADR-028 Decision 3).
    #
    # F-A2 ships the data-shape contract only. Populator wiring inside the 11
    # threat-detection agents is deferred to F-A3 under the 22-file zero-edit
    # invariant per ADR-023 / ADR-028 Decision 6. All findings emitted by the
    # 5 non-agentic baselines OMIT this field entirely, preserving byte-identity
    # under SOURCE_DATE_EPOCH=1700000000 per ADR-021.
    #
    # Conditional-key semantic (per Feature 104 delta_status precedent):
    #   - Field ABSENT  → finding cites no framework items (no implicit [] default)
    #   - source_attribution: []  → explicitly no citation claimed (present-but-empty)
    # The two states are semantically distinct and round-trip verbatim.
    record:
      taxonomy:
        type: string
        enum:
          - owasp
          - mitre-attack
          - mitre-atlas
          - nist-ai-rmf
          - cwe
        description: >
          Closed 5-value enum naming which F-A1 external-framework catalog
          the citation points into. Matches the filename stem of the
          catalog YAML under schemas/taxonomy/. Internal tachi taxonomies
          (tachi-control-category, tachi-stride-ai-category) are
          deliberately excluded per ADR-028 Decision 3.
      id:
        type: string
        description: >
          Non-empty; MUST resolve as a top-level id: key in
          schemas/taxonomy/{taxonomy}.yaml. Referential integrity is
          enforced by validate_source_attribution in scripts/tachi_parsers.py
          (ADR-028 Decision 5 — invoked by orchestrator Phase 4).
      relationship:
        type: string
        enum:
          - primary
          - related
          - derived
        default: primary
        description: >
          Closed 3-value enum characterizing how the finding relates to
          the cited framework item. primary = canonical mapping;
          related = adjacent mapping that adds context; derived = mapping
          inferred from another citation. Parser injects the default
          primary on emission when the field is absent on an input record.
    description: >
      Optional list of machine-readable citations to external compliance-
      framework items this finding addresses. Populated by threat-detection
      agents in F-A3 (deferred); F-A2 establishes the contract only.
      See ADR-028 for the Complex-Shape Addition Clarifier rationale and
      data-model.md V1..V6 for the full validation rule set.
    examples:
      - [{taxonomy: owasp, id: LLM05, relationship: primary}]
      - [{taxonomy: owasp, id: LLM05, relationship: primary}, {taxonomy: cwe, id: CWE-1426, relationship: primary}, {taxonomy: mitre-atlas, id: AML.T0051, relationship: related}]

# Validation Rules
#
# 1. id prefix must match category:
#    S-* → spoofing, T-* → tampering, R-* → repudiation,
#    I-* → info-disclosure, D-* → denial-of-service,
#    E-* → privilege-escalation, AG-* → agentic, LLM-* → llm
#    AGP-* → agentic (Feature 142 net-new pattern findings)
#
# 2. risk_level must match OWASP 3x3 computation from
#    likelihood and impact (see risk_matrix below)
#
# 3. references must contain at least one entry for AI
#    categories (agentic, llm)

# OWASP 3x3 Risk Matrix
#
#              LOW Likelihood   MEDIUM Likelihood   HIGH Likelihood
# HIGH Impact      Medium            High              Critical
# MEDIUM Impact    Low               Medium            High
# LOW Impact       Note              Low               Medium

# Scored Finding Extension (Optional)
#
# When quantitative risk scoring is applied via /tachi.risk-score,
# findings are extended with additional scoring and governance
# fields defined in schemas/risk-scoring.yaml.
#
# The scored_finding schema extends this finding schema with:
#   - cvss_base (0.0-10.0): CVSS 3.1 base score
#   - cvss_vector: Full CVSS 3.1 vector string
#   - exploitability (0.0-10.0): Exploitability assessment
#   - scalability (0.0-10.0): Scalability assessment
#   - reachability (0.0-10.0): Reachability assessment
#   - composite_score (0.0-10.0): Weighted composite
#   - severity_band: Critical/High/Medium/Low
#   - risk_owner, remediation_sla, risk_disposition, review_date
#
# See: schemas/risk-scoring.yaml for full field definitions
# Producer: agents/tachi/risk-scorer.md
# Output: templates/risk-scores.md, templates/risk-scores.sarif
