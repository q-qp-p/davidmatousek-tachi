# Risk Scoring Schema
#
# Extends the finding IR (finding.yaml) with four-dimensional
# quantitative scoring, composite risk calculation, severity bands,
# and governance fields for remediation tracking.
#
# Producers: agents/tachi/risk-scorer.md
# Consumers: templates/risk-scores.md, templates/risk-scores.sarif,
#            /tachi.risk-score command output
#
# Version: 1.0

schema_version: "1.1"

scored_finding:
  extends: finding  # All fields from finding.yaml, plus:

  cvss_base:
    type: number
    range: [0.0, 10.0]
    description: "CVSS 3.1 base score"

  cvss_vector:
    type: string
    pattern: "^CVSS:3\\.1/AV:[NALP]/AC:[LH]/PR:[NLH]/UI:[NR]/S:[UC]/C:[NLH]/I:[NLH]/A:[NLH]$"
    description: "Full CVSS 3.1 vector string for auditability"

  exploitability:
    type: number
    range: [0.0, 10.0]
    description: "Exploitability assessment score"

  scalability:
    type: number
    range: [0.0, 10.0]
    description: "Scalability assessment score"

  reachability:
    type: number
    range: [0.0, 10.0]
    description: "Reachability assessment score"

  composite_score:
    type: number
    range: [0.0, 10.0]
    description: "Weighted composite: (0.35*CVSS) + (0.30*Exploitability) + (0.15*Scalability) + (0.20*Reachability)"

  severity_band:
    type: string
    enum: [Critical, High, Medium, Low]
    description: >
      Mapped from composite_score per output.yaml CVSS ranges.
      Note: output.yaml defines 5 bands (Critical/High/Medium/Low/Note).
      For scoring, Note is consolidated into Low (0.0-3.9) since
      composite scores always produce a meaningful numeric value.

  risk_owner:
    type: string
    default: "Unassigned"

  remediation_sla:
    type: string
    description: "Severity-driven default: Critical=24h, High=7d, Medium=30d, Low=90d"

  risk_disposition:
    type: string
    enum: [Mitigate, Review, Accept, Transfer]
    default_mapping:
      Critical: Mitigate
      High: Mitigate
      Medium: Review
      Low: Review

  review_date:
    type: string
    format: "YYYY-MM-DD"
    description: "Scoring date + SLA duration"

  # Baseline-Aware Fields (v1.1)

  score_source:
    type: string
    enum:
      - inherited
      - fresh
    required: true
    default: "fresh"
    description: >
      Indicates whether scores were inherited from baseline or freshly computed.
      inherited: UNCHANGED findings — all scoring fields copied verbatim from baseline.
      fresh: NEW and UPDATED findings — scored using full 4-dimensional model.

  score_bounds:
    type: object
    nullable: true
    description: >
      CVSS base score bounds for NEW findings from Phase 2 discovery.
      Enforces bounded scoring within +/-1.0 of category default.
      Null for inherited scores and UPDATED findings (re-scored without bounds).
    properties:
      min:
        type: number
        range: [0.0, 10.0]
        description: "Lower bound: max(0.0, category_default - 1.0)"
      max:
        type: number
        range: [0.0, 10.0]
        description: "Upper bound: min(10.0, category_default + 1.0)"

# Default CVSS 3.1 Vectors per Threat Category
category_defaults:
  spoofing:            "CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:L/A:N"   # Auth bypass
  tampering:           "CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:N/I:H/A:L"   # Data modification
  repudiation:         "CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:N/I:L/A:N"   # Audit evasion
  info-disclosure:     "CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:N/A:N"   # Data exposure
  denial-of-service:   "CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:H"   # Resource exhaustion
  privilege-escalation: "CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:C/C:H/I:H/A:H"  # Privilege gain
  agentic:             "CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:C/C:H/I:H/A:L"   # Agent misuse (PR:L to avoid ceiling effect)
  llm:                 "CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:C/C:H/I:H/A:N"   # Prompt injection

# Asset-Sensitivity Modifiers (Issue #260 prototype, additive, opt-in)
#
# Applied during risk-scorer Section 3 (CVSS base scoring) AFTER the
# score_bounds +/-1.0 clamp. Each tag forces the named CVSS impact bit(s) to
# `H` when the finding's target component carries the tag in its
# component_asset_map entry. Modifiers are floor-only — they raise impact
# bits but never lower a category default. Components with no tag preserve
# the existing scoring behavior exactly.
#
# Tag vocabulary is closed at the prototype stage (per Issue #260 direction
# from davidmatousek 2026-05-05): "Hardcoded enum first. Extensibility is
# YAGNI until a real custom-tag use case shows up." Widening the enum is a
# minor schema bump per ADR-026 Complex-Shape Addition Clarifier.
#
# Modifier ceiling: the recomputed cvss_base after impact-bit elevation is
# clamped at `modifier_ceiling` so a single tag cannot push a finding to
# 10.0. Architect review (PR #262, 2026-05-06) pinned modifier_ceiling: 9.2 —
# defensive default for the prototype phase. Retains modifier band-crossing
# for genuinely-elevated findings while requiring non-CVSS signal for
# Critical-band entry; 9.5 was rejected as too aggressive (lets a single
# tag mint Critical findings on near-boundary composites), 9.0 as too
# conservative (defeats modifier participation in band crossings even when
# CVSS-after-elevation organically exceeds 9.0 for auth/secrets cases).
#
# See .claude/skills/tachi-risk-scoring/references/asset-modifiers.md for
# the per-tag rationale, parsing rules, and worked examples.

asset_modifiers:
  modifier_ceiling: 9.2

  tags:
    pii:
      forces: ["C:H"]
      rationale: "Personally Identifiable Information loss is a confidentiality-high event regardless of category default."
    phi:
      forces: ["C:H"]
      rationale: "Protected Health Information attracts the same confidentiality floor as PII (HIPAA, GDPR-special-category)."
    auth:
      forces: ["C:H", "I:H"]
      rationale: "Authentication material loss compromises both confidentiality (credential disclosure) and integrity (impersonation)."
    secrets:
      forces: ["C:H", "I:H"]
      rationale: "Long-lived secrets (API keys, signing keys, vault contents) carry the same C:H + I:H floor as auth material."
    financial:
      forces: ["I:H"]
      rationale: "Financial data integrity is the dominant impact axis — unauthorized modification drives losses regardless of confidentiality posture."
    safety:
      forces: ["A:H"]
      rationale: "Safety-critical components (life-safety, control loops) treat availability loss as the dominant impact axis."

# Composite Weights
weights:
  cvss_base: 0.35
  exploitability: 0.30
  scalability: 0.15
  reachability: 0.20

# Severity Bands (aligned with schemas/output.yaml)
severity_bands:
  Critical: { min: 9.0, max: 10.0, sla: "24h", disposition: "Mitigate" }
  High:     { min: 7.0, max: 8.9,  sla: "7d",  disposition: "Mitigate" }
  Medium:   { min: 4.0, max: 6.9,  sla: "30d", disposition: "Review" }
  Low:      { min: 0.0, max: 3.9,  sla: "90d", disposition: "Review" }
